function pCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const hdrs=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=line.split(",");
    const row={};
    hdrs.forEach((h,i)=>{row[h]=(vals[i]||"").replace(/"/g,"").trim();});
    return row;
  }).filter(r=>Object.values(r).some(v=>v));
}

function EqCurve({trades}){
  if(!trades||!trades.length)return null;
  const sorted=[...trades].sort((a,b)=>a.date.localeCompare(b.date));
  let cum=0;
  const pts=sorted.map(t=>{cum+=safe(t.pnl);return cum;});
  const mn=Math.min(0,...pts),mx=Math.max(0,...pts),rng=mx-mn||1;
  const W=600,H=110,P=8;
  const px=i=>P+(W-P*2)*(i/Math.max(pts.length-1,1));
  const py=v=>H-P-((v-mn)/rng)*(H-P*2);
  const last=pts[pts.length-1]||0;
  const col=last>=0?"#00ff9f":"#ff3b5c";
  const line=pts.map((v,i)=>(i===0?"M":"L")+px(i).toFixed(1)+","+py(v).toFixed(1)).join(" ");
  const fill=line+" L"+px(pts.length-1).toFixed(1)+","+H+" L"+px(0).toFixed(1)+","+H+" Z";
  return(
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:H,display:"block"}} preserveAspectRatio="none">
      <defs>
        <linearGradient id="ecg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={col} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={col} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <line x1={P} y1={py(0).toFixed(1)} x2={W-P} y2={py(0).toFixed(1)} stroke="#3d4f66" strokeWidth="1" strokeDasharray="4,4"/>
      <path d={fill} fill="url(#ecg)"/>
      <path d={line} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round"/>
      <circle cx={px(pts.length-1).toFixed(1)} cy={py(last).toFixed(1)} r="4" fill={col}/>
    </svg>
  );
}

function MDView({text}){
  if(!text)return null;
  const lines=text.split("\n");
  return(
    <div style={{fontSize:13,lineHeight:1.75,color:"#c5d3e0"}}>
      {lines.map((line,i)=>{
        if(line.startsWith("### "))return <div key={i} style={{color:"#b45bff",fontWeight:700,fontSize:14,marginTop:14,marginBottom:4}}>{line.slice(4)}</div>;
        if(line.startsWith("## ")) return <div key={i} style={{color:"#00d4ff",fontWeight:800,fontSize:16,marginTop:16,marginBottom:6,borderBottom:"1px solid rgba(0,212,255,0.2)",paddingBottom:6}}>{line.slice(3)}</div>;
        if(line.startsWith("# "))  return <div key={i} style={{color:"#00ff9f",fontWeight:800,fontSize:18,marginTop:18,marginBottom:8}}>{line.slice(2)}</div>;
        if(line.startsWith("- ")||line.startsWith("* "))return <div key={i} style={{marginBottom:3,paddingLeft:14}}>{"• "+line.slice(2)}</div>;
        if(line.trim()==="")return <div key={i} style={{height:6}}/>;
        const parts=line.split(/(\*\*[^*]+\*\*)/g);
        return(
          <div key={i} style={{marginBottom:2}}>
            {parts.map((p,j)=>{
              if(p.startsWith("**")&&p.endsWith("**"))return <strong key={j} style={{color:"#00d4ff"}}>{p.slice(2,-2)}</strong>;
              return <span key={j}>{p}</span>;
            })}
          </div>
        );
      })}
    </div>
  );
}

  const avl=useCallback((msg,who)=>setVLog(p=>[...p.slice(-20),{msg,who,ts:Date.now()}]),[]);

  const speak=useCallback(function(text,cb){
    if(!syn.current||muted){if(cb)cb();return;}
    try{syn.current.cancel();}catch(e){}
    // iOS Safari ties up the audio session while speech recognition is active —
    // if we try to speak right after stopping recognition, the OS sometimes
    // silently drops the audio even though the utterance fires onend normally.
    // Detect that case and give the audio session time to switch from
    // "recording" to "playback" before actually starting speech synthesis.
    var micWasBusy=!!wOn.current||!!cRef.current||!!wRef.current;
    if(wRef.current){try{wRef.current.abort();}catch(e){}}
    if(cRef.current){try{cRef.current.abort();}catch(e){}cRef.current=null;}
    interacted.current=true;
    if(!voiceUnlocked.current){
      try{
        var unlock=new SpeechSynthesisUtterance('');
        unlock.volume=0;
        syn.current.speak(unlock);
        voiceUnlocked.current=true;
      }catch(e){}
    }
    var voiceDelay=micWasBusy?380:80;
    setTimeout(function(){
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.rate=0.82;u.pitch=0.68;u.volume=1;
        var allV=[];
        try{allV=syn.current.getVoices()||[];}catch(e){}
        if(!allV.length)allV=vcs.current||[];
        var priority=[
          function(v){return v.name==='Daniel (Enhanced)';},
          function(v){return v.name==='Daniel (Premium)';},
          function(v){return v.name==='Arthur (Enhanced)';},
          function(v){return v.name==='Arthur (Premium)';},
          function(v){return v.name==='Daniel';},
          function(v){return v.name==='Arthur';},
          function(v){return v.name.indexOf('Daniel')>=0&&v.name.indexOf('Enhanced')>=0;},
          function(v){return v.name.indexOf('Daniel')>=0&&v.name.indexOf('Premium')>=0;},
          function(v){return v.name.indexOf('Arthur')>=0&&v.name.indexOf('Enhanced')>=0;},
          function(v){return v.name.indexOf('Daniel')>=0;},
          function(v){return v.name.indexOf('Arthur')>=0;},
          function(v){return v.name.indexOf('Oliver')>=0;},
          function(v){return v.name.indexOf('Male')>=0&&v.lang.indexOf('en-GB')===0;},
          function(v){return v.lang==='en-GB';},
          function(v){return v.lang.indexOf('en-GB')===0;},
          function(v){return v.lang.indexOf('en')===0;},
        ];
        var voice=null;
        for(var pi=0;pi<priority.length;pi++){voice=allV.find(priority[pi]);if(voice)break;}
        if(voice){
          u.voice=voice;
          if(voice.name.indexOf('Daniel')>=0){u.rate=0.80;u.pitch=0.65;}
          else if(voice.name.indexOf('Arthur')>=0){u.rate=0.82;u.pitch=0.68;}
        }
        setVState('speaking');
        var done=false;
        var finish=function(){if(done)return;done=true;setVState('idle');if(cb)cb();};
        var rt=setInterval(function(){try{if(syn.current&&syn.current.paused)syn.current.resume();}catch(e){}},250);
        u.onend=function(){clearInterval(rt);finish();};
        u.onerror=function(){clearInterval(rt);finish();};
        syn.current.speak(u);
      }catch(e){if(cb)cb();setVState('idle');}
    },voiceDelay);
  },[muted]);

  const stats=useMemo(()=>{

      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||"HTTP "+res.status);}
      const deals=await res.json();
      const mapped=deals.filter(d=>d.entryType==="DEAL_ENTRY_OUT"&&d.type!=="DEAL_TYPE_BALANCE").map(d=>({id:uid(),createdAt:Date.now(),symbol:(d.symbol||"UNK").toUpperCase(),platform:"MT4/MT5",direction:d.type==="DEAL_TYPE_SELL"?"SHORT":"LONG",entry:String(d.openPrice||""),exit:String(d.closePrice||d.price||""),size:String(d.volume||""),pnl:String(d.profit||0),date:((d.time||d.brokerTime||"").slice(0,10))||new Date().toISOString().slice(0,10),emotion:"Calm",setup:"",entryReason:"",exitReason:"",notes:"[MetaAPI]"}));
      const fresh=mapped.filter(t=>!isDupe(t));

  // ── TRADELOCKER ─────────────────────────────────────────────────────────
  const tlGetBase=function(){return tlServer==='demo'?'https://demo.tradelocker.com':'https://live.tradelocker.com';};
  const tlLogin=async function(){
    var base=tlGetBase();
    var storedRefresh='';
    try{storedRefresh=localStorage.getItem('tl_refresh')||'';}catch(e){}
    if(!storedRefresh&&tlRefreshToken)storedRefresh=tlRefreshToken;
    if(storedRefresh){
      try{
        var rRes=await fetch(base+'/backend-api/auth/jwt/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:storedRefresh})});
        var rData=await rRes.json();
        if(rRes.ok&&rData.s==='ok'&&rData.d&&rData.d.accessToken){
          var newTok=rData.d.accessToken;
          var newRef=rData.d.refreshToken||storedRefresh;
          setTlToken(newTok);setTlRefreshToken(newRef);
          try{localStorage.setItem('tl_token',newTok);localStorage.setItem('tl_refresh',newRef);}catch(e){}

  const geminiCall=async function(systemText,contents){
    if(!apiKey){

    var allContents=[];

      allContents.push({role:'model',parts:[{text:'Understood Sir. I will follow those instructions exactly.'}]});
    }
    for(var ci=0;ci<contents.length;ci++){allContents.push(contents[ci]);}
    var body={contents:allContents,generationConfig:{maxOutputTokens:1200,temperature:0.7}};
    // Try primary model then fallback
    var models=['gemini-1.5-flash','gemini-1.5-flash-latest','gemini-pro'];
    var lastErr='Unknown error';
    for(var mi=0;mi<models.length;mi++){
      try{
        var url='https://generativelanguage.googleapis.com/v1beta/models/'+models[mi]+':generateContent?key='+encodeURIComponent(apiKey);

    }
    throw new Error(lastErr);
  };
