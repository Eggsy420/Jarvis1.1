<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JARVIS"/>
<title>J.A.R.V.I.S</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea,select{-webkit-user-select:auto;user-select:auto}
html,body{height:100%;background:#04060f;overflow:hidden;color:#dde6f0;font-family:system-ui,-apple-system,sans-serif}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#root{height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#04060f}::-webkit-scrollbar-thumb{background:#00d4ff33;border-radius:4px}

/* Splash */
#splash{position:fixed;inset:0;background:#04060f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px;transition:opacity .7s ease}
#splash.out{opacity:0;pointer-events:none}
#splash svg{animation:pulse 2s ease-in-out infinite}
#sname{color:#00d4ff;font-size:13px;letter-spacing:5px;font-weight:700;font-family:monospace}
#ssub{color:#8892a4;font-size:10px;letter-spacing:3px;font-family:monospace}

/* Nav */
#nav{background:#04060fee;border-bottom:1px solid rgba(0,212,255,.1);overflow-x:auto;display:flex;align-items:center;gap:2px;padding:0 8px;flex-shrink:0;position:sticky;top:0;z-index:100;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
#nav::-webkit-scrollbar{display:none}
.nhub{width:34px;height:34px;border-radius:50%;border:2px solid #00d4ff;background:rgba(0,212,255,.15);color:#00d4ff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:6px 4px 6px 0;animation:glow 3s ease-in-out infinite}
.ntab{padding:8px 10px;border:none;border-bottom:2px solid transparent;background:transparent;color:#8892a4;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:.3px;font-family:inherit;transition:all .2s}
.ntab.on{color:#00d4ff;border-bottom-color:#00d4ff;background:rgba(0,212,255,.1)}

/* Content */
#content{flex:1;padding:14px 14px 40px;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:600px){#content{padding:20px 20px 40px}}

/* Panels */
.panel{border:1px solid rgba(0,212,255,.2);border-radius:14px;background:linear-gradient(145deg,#0c1829,#080f1c);margin-bottom:12px;padding:16px}
.panel.green{border-color:rgba(0,255,159,.2)}
.panel.gold{border-color:rgba(245,166,35,.2)}
.panel.red{border-color:rgba(255,59,92,.2)}
.panel.purple{border-color:rgba(180,91,255,.2)}

/* Typography */
.lbl{font-size:10px;font-weight:700;color:#8892a4;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.h1{font-size:19px;font-weight:800;margin-bottom:14px}

/* Inputs */
input,textarea,select{background:#050d1a;color:#dde6f0;border:1px solid rgba(0,212,255,.22);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;width:100%;display:block;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:rgba(0,212,255,.6);box-shadow:0 0 0 2px rgba(0,212,255,.12)}
textarea{resize:vertical;min-height:60px}

/* Buttons */
.btn{border:1px solid rgba(0,212,255,.5);background:rgba(0,0,0,.3);color:#00d4ff;border-radius:8px;padding:10px 18px;font-weight:700;cursor:pointer;font-size:12px;letter-spacing:.5px;font-family:inherit;transition:all .2s;box-shadow:0 0 12px rgba(0,212,255,.18)}
.btn:active{opacity:.7}
.btn.g{border-color:rgba(0,255,159,.5);color:#00ff9f;box-shadow:0 0 12px rgba(0,255,159,.18)}
.btn.r{border-color:rgba(255,59,92,.5);color:#ff3b5c;box-shadow:0 0 12px rgba(255,59,92,.18)}
.btn.gold{border-color:rgba(245,166,35,.5);color:#f5a623;box-shadow:0 0 12px rgba(245,166,35,.18)}
.btn.pur{border-color:rgba(180,91,255,.5);color:#b45bff;box-shadow:0 0 12px rgba(180,91,255,.18)}
.btn.w100{width:100%;display:block;text-align:center}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* Stats card */
.sc{padding:13px 14px;border-radius:10px;flex:1;min-width:110px;background:linear-gradient(145deg,#0c1829,#080f1c);border:1px solid rgba(0,212,255,.2)}
.sc .sv{font-family:monospace;font-weight:700;font-size:20px;margin-top:3px}

/* Badge */
.badge{border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700;border:1px solid;letter-spacing:.5px;display:inline-block}

/* Trade row */
.trow{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);margin-bottom:6px;cursor:pointer;transition:background .15s}
.trow:active{background:rgba(0,212,255,.05)}

/* HUD */
#hud{position:fixed;inset:0;background:#04060f;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#hud.hidden{display:none}

/* Notification */
#notif{position:fixed;top:70px;right:14px;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;z-index:8000;display:none;max-width:260px;animation:fadein .3s ease;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}

/* Voice chip */
#vchip{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:6px 16px;color:#00d4ff;font-size:12px;font-weight:600;z-index:7000;display:none;max-width:80%;text-align:center}

/* Grid helpers */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mono{font-family:monospace}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.muted{color:#8892a4}
.green{color:#00ff9f}.red{color:#ff3b5c}.blue{color:#00d4ff}.gold{color:#f5a623}.pur{color:#b45bff}
.bold{font-weight:700}

/* Scan overlay */
.scan{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.scan::before{content:"";position:absolute;top:-60px;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(0,212,255,.04),transparent);animation:scanline 10s linear infinite}

/* Animations */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.96)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(0,212,255,.3)}50%{box-shadow:0 0 24px rgba(0,212,255,.7)}}
@keyframes fadein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes arc1{from{stroke-dashoffset:0}to{stroke-dashoffset:-502}}
@keyframes arc2{from{stroke-dashoffset:502}to{stroke-dashoffset:0}}
@keyframes globespin{from{transform:rotate(0deg) scaleY(.32)}to{transform:rotate(360deg) scaleY(.32)}}
@keyframes corepulse{0%,100%{box-shadow:0 0 20px #00d4ff,0 0 50px rgba(0,212,255,.5)}50%{box-shadow:0 0 40px #00d4ff,0 0 90px rgba(0,212,255,.7)}}
@keyframes globepulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes wpulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes waveBar{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.4)}}
@keyframes viewin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanh{0%,100%{transform:scaleX(1);opacity:.3}50%{transform:scaleX(.7);opacity:.8}}
@keyframes floatDot{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
/* Improved HUD glow */
#hud button:active{opacity:.7;transform:scale(.95)}
/* Better input styling */
input[type=date]{color-scheme:dark}
/* Animated gradient borders on panels */
.panel{transition:border-color .3s}
</style>
</head>

<div id="splash">
<svg width="100" height="100" viewBox="0 0 512 512">
<rect width="512" height="512" fill="#04060f"/>
<polygon points="256,60 420,155 420,357 256,452 92,357 92,155" fill="none" stroke="#00d4ff" stroke-width="8"/>
<polygon points="256,100 390,172 390,340 256,412 122,340 122,172" fill="none" stroke="#00d4ff" stroke-width="4" opacity=".5"/>
<circle cx="256" cy="256" r="80" fill="none" stroke="#00d4ff" stroke-width="5"/>
<circle cx="256" cy="256" r="18" fill="#00d4ff"/>
<line x1="256" y1="174" x2="256" y2="208" stroke="#00d4ff" stroke-width="3.5"/>
<line x1="256" y1="304" x2="256" y2="338" stroke="#00d4ff" stroke-width="3.5"/>
<line x1="174" y1="256" x2="208" y2="256" stroke="#00d4ff" stroke-width="3.5"/>
<line x1="304" y1="256" x2="338" y2="256" stroke="#00d4ff" stroke-width="3.5"/>

</div>

<div id="notif"></div>

<div id="root">
<div id="nav"></div>
<div id="content"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// JARVIS v4 — Pure Vanilla JS, Zero Dependencies, Zero Compilation
// ═══════════════════════════════════════════════════════════════════════════

var BLUE='#00d4ff',GREEN='#00ff9f',RED='#ff3b5c',GOLD='#f5a623',PURPLE='#b45bff';

// ── UTILS ─────────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function safe(v){return parseFloat(v)||0;}
function f2(v){return (safe(v)).toFixed(2);}
function fmtU(v){var n=safe(v);return(n>=0?'+$':'-$')+Math.abs(n).toFixed(2);}
function dstr(d){if(!d)return'';var dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function pad2(n){return String(n).padStart(2,'0');}
function today(){return new Date().toISOString().slice(0,10);}
function qs(sel){return document.querySelector(sel);}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}
function div(cls,html){return el('div',cls,html);}
function span(cls,html){return el('span',cls,html);}
function pivots(h,l,c){
  var pp=(h+l+c)/3;
  return{pp:pp,r1:2*pp-l,r2:pp+(h-l),r3:h+2*(pp-l),s1:2*pp-h,s2:pp-(h-l),s3:l-2*(h-pp),
    ch4:c+(h-l)*1.1/2,ch3:c+(h-l)*1.1/4,cl3:c-(h-l)*1.1/4,cl4:c-(h-l)*1.1/2};
}

// ── STORAGE ───────────────────────────────────────────────────────────────
function load(k,def){try{var v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadStr(k,def){try{return localStorage.getItem(k)||def;}catch(e){return def;}}
function saveStr(k,v){try{localStorage.setItem(k,v);}catch(e){}}

// ── STATE ─────────────────────────────────────────────────────────────────
var S={
  linkedAccounts:load('jv_accounts',[]),
  view:'dashboard',
  trades:load('jv_trades',[]),
  challenges:load('jv_chal',[]),
  apiKey:(loadStr('jarvis_api_key','')||'').trim(),
  mktData:{},mktReport:'',mktErr:'',mktLoad:false,mktRLoad:false,mktLastFetch:0,mktStatus:'',
  wakeOn:false,vState:'idle',vText:'',muted:false,
  riskAcct:loadStr('risk_acct','100000'),riskPct:loadStr('risk_pct','1'),riskResult:null,
  aiChat:[],aiLoad:false,aiMode:'coach',
  pasteText:'',parsedTrades:null,pasteErr:'',pasteLoad:false,
};

// ── CONSTANTS ─────────────────────────────────────────────────────────────
var EMOTIONS=[
  {l:'Confident',i:'💪',c:GREEN},{l:'Calm',i:'😌',c:BLUE},{l:'Focused',i:'🎯',c:'#ffd700'},
  {l:'Anxious',i:'😰',c:RED},{l:'Greedy',i:'🤑',c:GOLD},{l:'Fearful',i:'😨',c:PURPLE},
  {l:'FOMO',i:'🚀',c:RED},{l:'Neutral',i:'😐',c:'#8892a4'}
];
var SETUPS=['Breakout','Pullback','Reversal','Range','Trend Follow','News Play','Scalp','Swing','ICT','SMC'];
var PROP_FIRMS=[
  {n:'Upcomers',c:GREEN,md:5,dd:2,t:8},{n:'FTMO',c:BLUE,md:10,dd:5,t:10},
  {n:'MyFundedFX',c:GOLD,md:8,dd:4,t:8},{n:'The5ers',c:PURPLE,md:6,dd:3,t:6},
  {n:'Funded Next',c:RED,md:8,dd:4,t:10},{n:'E8 Funding',c:'#ffd700',md:8,dd:4,t:8}
];
var NAV_ITEMS=[
  {k:'dashboard',i:'◈',l:'Dashboard'},{k:'analytics',i:'📊',l:'Analytics'},
  {k:'log',i:'✦',l:'Log Trade'},{k:'history',i:'◉',l:'Journal'},
  {k:'challenge',i:'🏆',l:'Challenges'},{k:'sync',i:'⟳',l:'Sync'},
  {k:'ai',i:'◆',l:'AI Chat'},{k:'markets',i:'📡',l:'Markets'},
  {k:'platforms',i:'⬡',l:'Platforms'}
];
var GEMINI_MODELS=['gemini-1.5-flash','gemini-1.5-flash-latest','gemini-pro'];

// ── NOTIFY ────────────────────────────────────────────────────────────────
var notifTimer=null;
function notify(msg,color){
  var n=qs('#notif');
  n.textContent=msg;n.style.display='block';n.style.border='1px solid '+(color||BLUE)+'55';
  n.style.background=(color||BLUE)+'22';n.style.color=(color||BLUE);
  clearTimeout(notifTimer);notifTimer=setTimeout(function(){n.style.display='none';},3000);
}

// ── GEMINI API ────────────────────────────────────────────────────────────
function geminiCall(system,contents,onSuccess,onErr){
  var key=(S.apiKey||"").replace(/\s/g,"");
  if(!key){onErr("No API key. Add your Gemini key in Platforms tab.");return;}
  var all=[];
  if(system){all.push({role:"user",parts:[{text:system}]});all.push({role:"model",parts:[{text:"Understood."}]});}
  for(var i=0;i<contents.length;i++)all.push(contents[i]);
  var reqBody={contents:all,generationConfig:{maxOutputTokens:1400,temperature:0.7}};
  var bodyStr=JSON.stringify(reqBody);
  var BASES=[
    "https://generativelanguage.googleapis.com/v1beta/models/",
    "https://generativelanguage.googleapis.com/v1/models/"
  ];
  var MODELS=[
    "gemini-2.0-flash","gemini-2.0-flash-lite","gemini-2.0-flash-exp",
    "gemini-1.5-flash","gemini-1.5-flash-latest","gemini-1.5-flash-001","gemini-1.5-flash-002",
    "gemini-1.5-pro","gemini-1.5-pro-latest",
    "gemini-pro","gemini-1.0-pro","gemini-1.0-pro-001"
  ];
  var PROXIES=["","https://corsproxy.io/?","https://api.allorigins.win/raw?url="];
  // Use cached working model if we found one before
  if(S._geminiModel){
    var cached=S._geminiModel;
    fetch((cached.pi===0?cached.url:PROXIES[cached.pi]+encodeURIComponent(cached.url)),
      {method:"POST",headers:{"Content-Type":"application/json"},body:bodyStr})
      .then(function(r){return r.text().then(function(t){
        var d;try{d=JSON.parse(t);}catch(e){S._geminiModel=null;geminiCall(system,contents,onSuccess,onErr);return;}
        if(!r.ok){S._geminiModel=null;geminiCall(system,contents,onSuccess,onErr);return;}
        onSuccess(d);
      });}).catch(function(){S._geminiModel=null;geminiCall(system,contents,onSuccess,onErr);});
    return;
  }
  // Discover working model by trying all combinations
  var attempts=[];
  for(var bi=0;bi<BASES.length;bi++){
    for(var mi=0;mi<MODELS.length;mi++){
      for(var pi=0;pi<PROXIES.length;pi++){
        attempts.push({url:BASES[bi]+MODELS[mi]+":generateContent?key="+encodeURIComponent(key),pi:pi,label:BASES[bi].indexOf("v1beta")>=0?"v1beta":"v1",model:MODELS[mi]});
      }
    }
  }
  var ai=0;
  function tryNext(){
    if(ai>=attempts.length){onErr("No working Gemini model found. Your key may not have generateContent access. Try: aistudio.google.com/apikey to create a fresh key.");return;}
    var a=attempts[ai++];
    var fetchUrl=a.pi===0?a.url:PROXIES[a.pi]+encodeURIComponent(a.url);
    fetch(fetchUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:bodyStr})
      .then(function(r){return r.text().then(function(t){
        var d;try{d=JSON.parse(t);}catch(e){tryNext();return;}
        if(!r.ok){
          if(r.status===401||r.status===403){onErr("API key rejected ("+r.status+"). Go to aistudio.google.com/apikey and create a new key.");return;}
          tryNext();return;
        }
        // Found a working model — cache it
        S._geminiModel=a;
        onSuccess(d);
      });})
      .catch(function(){tryNext();});
  }
  tryNext();
}

function geminiText(d){try{return d.candidates[0].content.parts.filter(function(p){return p.text;}).map(function(p){return p.text;}).join(' ').trim();}catch(e){return '';}}

// ── VOICE (SpeechSynthesis) ───────────────────────────────────────────────
var voiceLock=false;
var wakeRec=null;var cmdRec=null;var wakeOn=false;
function speak(text,cb){
  if(S.muted||!window.speechSynthesis){if(cb)cb();return;}
  try{window.speechSynthesis.cancel();}catch(e){}
  var u=new SpeechSynthesisUtterance(text);
  u.rate=0.82;u.pitch=0.68;u.volume=1;
  var voices=[];try{voices=window.speechSynthesis.getVoices()||[];}catch(e){}
  var priorities=[function(v){return v.name==='Daniel (Enhanced)';},function(v){return v.name==='Daniel';},function(v){return v.lang==='en-GB';},function(v){return v.lang.indexOf('en')===0;}];
  var voice=null;for(var pi=0;pi<priorities.length;pi++){voice=voices.find(priorities[pi]);if(voice)break;}
  if(voice)u.voice=voice;
  setVState('speaking');
  var done=false;
  var fin=function(){if(done)return;done=true;setVState('idle');if(cb)cb();};
  var rt=setInterval(function(){try{if(window.speechSynthesis.paused)window.speechSynthesis.resume();}catch(e){}},250);
  u.onend=function(){clearInterval(rt);fin();};u.onerror=function(){clearInterval(rt);fin();};
  setTimeout(function(){try{window.speechSynthesis.speak(u);}catch(e){fin();}},80);
}
function setVState(st){
  S.vState=st;
  var hud=qs('#hud');
  if(hud&&!hud.classList.contains('hidden'))renderHUD();
}
function showVChip(t){
  S.vText=t;var c=qs('#vchip');
  if(t){c.textContent=t;c.style.display='block';}
  else{c.style.display='none';}
}

// Wake word
function startWake(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){notify('Wake word needs Chrome or Safari.',RED);return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(){
    function launch(){
      if(!wakeOn)return;
      var r=new SR();r.lang='en-US';r.continuous=true;r.interimResults=true;
      wakeRec=r;
      r.onresult=function(ev){
        for(var i=ev.resultIndex;i<ev.results.length;i++){
          var t=ev.results[i][0].transcript.toLowerCase();
          if(t.indexOf('hey jarvis')>=0||t.indexOf('jarvis')>=0){
            try{r.abort();}catch(e){}
            wakeRec=null;
            showHUD(true);
            speak('Yes Sir?',function(){listenOnce();});
            break;
          }
        }
      };
      r.onend=function(){if(wakeOn)setTimeout(launch,300);};
      r.onerror=function(ev){if(ev.error==='not-allowed'){wakeOn=false;S.wakeOn=false;notify('Mic denied.',RED);}};
      try{r.start();}catch(e){if(wakeOn)setTimeout(launch,500);}
    }
    launch();
  }).catch(function(){notify('Microphone access denied.',RED);});
}
function toggleWake(){
  wakeOn=!wakeOn;S.wakeOn=wakeOn;
  if(wakeOn){startWake();}else{if(wakeRec){try{wakeRec.abort();}catch(e){}}wakeRec=null;}
  renderHUD();renderNav();
}
function listenOnce(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){notify('Speech recognition unavailable.',RED);return;}
  if(wakeRec){try{wakeRec.abort();}catch(e){}}wakeRec=null;
  if(cmdRec){try{cmdRec.abort();}catch(e){}}
  var r=new SR();r.lang='en-US';r.interimResults=false;r.maxAlternatives=1;
  cmdRec=r;setVState('listening');showVChip('Listening...');
  var heard=false;
  r.onresult=function(ev){heard=true;handleCmd(ev.results[0][0].transcript);};
  r.onerror=function(ev){setVState('idle');showVChip('');cmdRec=null;if(ev.error!=='aborted'&&ev.error!=='no-speech')notify('Mic: '+ev.error,RED);};
  r.onend=function(){cmdRec=null;if(!heard){setVState('idle');showVChip('');}};
  try{r.start();}catch(e){setVState('idle');showVChip('');}
}
function handleCmd(t){
  showVChip(t);setVState('thinking');
  var lc=t.toLowerCase();

// ── STATS ─────────────────────────────────────────────────────────────────
function getStats(){
  var t=S.trades;if(!t.length)return null;
  var wins=t.filter(function(x){return safe(x.pnl)>0;});
  var losses=t.filter(function(x){return safe(x.pnl)<0;});
  var tot=t.reduce(function(s,x){return s+safe(x.pnl);},0);
  var avgW=wins.length?wins.reduce(function(s,x){return s+safe(x.pnl);},0)/wins.length:0;
  var avgL=losses.length?Math.abs(losses.reduce(function(s,x){return s+safe(x.pnl);},0)/losses.length):0;
  return{total:t.length,wr:Math.round(wins.length/t.length*100),tot:tot,
    avgW:avgW,avgL:avgL,pf:avgL?(avgW/avgL).toFixed(2):'∞',
    best:Math.max.apply(null,t.map(function(x){return safe(x.pnl);})),
    worst:Math.min.apply(null,t.map(function(x){return safe(x.pnl);}))};
}

function eqCurve(trades){
  var c=document.createElement('canvas');c.height=60;c.style.width='100%';c.style.display='block';
  if(!trades||trades.length<2)return c;
  var sorted=[].concat(trades).reverse();
  var pts=[];var run=0;
  sorted.forEach(function(t){run+=safe(t.pnl);pts.push(run);});
  requestAnimationFrame(function(){
    c.width=c.offsetWidth||300;
    var ctx=c.getContext('2d');
    var W=c.width,H=60;
    var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts);
    var range=mx-mn||1;
    var col=pts[pts.length-1]>=0?GREEN:RED;
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();
    pts.forEach(function(v,i){
      var x=i/(pts.length-1)*W,y=H-(v-mn)/range*(H-4)-2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.fillStyle=col+'22';ctx.beginPath();
    ctx.moveTo(0,H);
    pts.forEach(function(v,i){var x=i/(pts.length-1)*W,y=H-(v-mn)/range*(H-4)-2;ctx.lineTo(x,y);});
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  });
  return c;
}
function calMap(trades){
  var now=new Date();var y=now.getFullYear(),m=now.getMonth();
  var dim=new Date(y,m+1,0).getDate(),first=new Date(y,m,1).getDay();
  var todayStr=today();
  var pnlMap={};
  trades.forEach(function(t){
    if(t.date&&t.date.slice(0,7)===(y+'-'+pad2(m+1)))pnlMap[t.date]=(pnlMap[t.date]||0)+safe(t.pnl);
  });
  var d=div('');d.style.cssText='animation:viewin .35s ease';
  var hdr=div('grid2');hdr.style.gridTemplateColumns='repeat(7,1fr)';hdr.style.gap='3px';hdr.style.marginBottom='6px';
  ['S','M','T','W','T','F','S'].forEach(function(day){
    var c=div('');c.style.cssText='text-align:center;font-size:9px;color:#3d4f66;font-weight:700';c.textContent=day;
    hdr.appendChild(c);
  });
  d.appendChild(hdr);
  var grid=div('');grid.style.cssText='display:grid;grid-template-columns:repeat(7,1fr);gap:3px';
  for(var i=0;i<first;i++){var empty=div('');empty.style.aspectRatio='1';grid.appendChild(empty);}
  for(var day=1;day<=dim;day++){
    var dk=y+'-'+pad2(m+1)+'-'+pad2(day);
    var pnl=pnlMap[dk]||0;var isT=dk===todayStr;
    var alpha=pnl?Math.min(.9,Math.abs(pnl)/500*.8+.15):0;
    var bg=pnl>0?'rgba(0,255,159,'+alpha+')':pnl<0?'rgba(255,59,92,'+alpha+')':'rgba(255,255,255,.05)';
    var cell=div('');
    cell.style.cssText='aspect-ratio:1;border-radius:4px;background:'+bg+';border:1px solid '+(isT?BLUE:pnl?'rgba(0,212,255,.2)':'rgba(255,255,255,.05)')+';display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40px;box-shadow:'+(isT?'0 0 6px rgba(0,212,255,.5)':'none');
    cell.title=dstr(dk)+(pnl?' '+fmtU(pnl):'');
    var dn=div('');dn.style.cssText='font-size:13px;font-weight:700;color:'+(isT?BLUE:'rgba(255,255,255,.85)')+';line-height:1.2';dn.textContent=day;
    cell.appendChild(dn);
    if(pnl){var pn=div('');pn.style.cssText='font-size:9px;font-weight:800;color:'+(pnl>0?GREEN:RED)+';line-height:1';pn.textContent=(pnl>0?'+':'')+fmtU(pnl);cell.appendChild(pn);}
    grid.appendChild(cell);
  }
  d.appendChild(grid);return d;
}

// ── MARKET DATA ───────────────────────────────────────────────────────────
function fetchMkt(){
  notify('Fetching market data...',GOLD);S.mktErr='';
  var PROXIES=[
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
    'https://api.codetabs.com/v1/proxy?quest=',
    'https://thingproxy.freeboard.io/fetch/',
  ];
  function tryFetch(url,done){
    function tryProxy(i){
      if(i>=PROXIES.length){done(null);return;}
      fetch(PROXIES[i]+encodeURIComponent(url),{cache:'no-store'}).then(function(r){
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.text();
      }).then(function(t){done(t);}).catch(function(){tryProxy(i+1);});
    }
    tryProxy(0);
  }
  // Parse Stooq CSV
  function parseStooq(csv){
    var ls=csv?csv.trim().split('\n').filter(function(l){return l&&l[0]>='0'&&l[0]<='9';}):[];
    if(ls.length<2)return null;
    var last=ls[ls.length-1].split(','),prev=ls[ls.length-2].split(',');
    var c=parseFloat(prev[4])||0,p=parseFloat(last[4])||c;
    if(!c||!p)return null;
    return{o:parseFloat(prev[1])||c,h:parseFloat(prev[2])||c,l:parseFloat(prev[3])||c,c:c,price:p,change:c>0?parseFloat(((p-c)/c*100).toFixed(2)):0};
  }
  // Parse Yahoo Finance JSON
  function parseYahoo(txt,sym){
    try{
      var j=JSON.parse(txt);
      var res=j.chart&&j.chart.result&&j.chart.result[0];
      if(!res)return null;
      var q=res.indicators&&res.indicators.quote&&res.indicators.quote[0];
      var closes=q&&q.close;var opens=q&&q.open;var highs=q&&q.high;var lows=q&&q.low;
      if(!closes||closes.length<2)return null;
      var valid=closes.filter(function(x){return x!=null;});
      if(valid.length<2)return null;
      var pc=valid[valid.length-2],lc=valid[valid.length-1];
      return{o:parseFloat((opens?opens.filter(function(x){return x!=null;}).pop():pc)||pc).toFixed(2)*1,h:parseFloat((highs?highs.filter(function(x){return x!=null;}).pop():lc)||lc).toFixed(2)*1,l:parseFloat((lows?lows.filter(function(x){return x!=null;}).pop():lc)||lc).toFixed(2)*1,c:pc,price:lc,change:pc>0?parseFloat(((lc-pc)/pc*100).toFixed(2)):0};
    }catch(e){return null;}
  }
  var ASSETS={
    ES:{stooq:'es.f',yahoo:'ES=F',label:'S&P 500'},
    NQ:{stooq:'nq.f',yahoo:'NQ=F',label:'Nasdaq'},
    XAU:{stooq:'xauusd',yahoo:'GC=F',label:'Gold'},
  };
  var done=0,out={},keys=['ES','NQ','XAU'];
  function finish(){
    done++;
    if(done<keys.length)return;
    S.mktData=out;S.mktLastFetch=Date.now();
    if(Object.keys(out).length){
      S.mktErr='';
      S.mktStatus=Object.keys(out).map(function(k){var d=out[k];return ASSETS[k].label+' '+f2(d.price)+(d.change>=0?' +':' ')+f2(d.change)+'%';}).join('  ·  ');
      notify('Market data updated.',GREEN);
    } else {
      S.mktErr='Market data unavailable. CORS proxies may be blocked on your network. Try again or use the AI briefing with manual data.';
      notify('Market data failed.',RED);
    }
    if(S.view==='markets')navigate('markets');
  }
  keys.forEach(function(k){
    var asset=ASSETS[k];
    // Try Yahoo Finance first (more reliable)
    var yahooUrl='https://query1.finance.yahoo.com/v8/finance/chart/'+asset.yahoo+'?interval=1d&range=5d';
    tryFetch(yahooUrl,function(txt){
      if(txt){var r=parseYahoo(txt,asset.yahoo);if(r){out[k]=r;finish();return;}}
      // Fallback: Stooq
      var stooqUrl='https://stooq.com/q/d/l/?s='+asset.stooq+'&i=d';
      tryFetch(stooqUrl,function(csv){
        if(csv){var r2=parseStooq(csv);if(r2){out[k]=r2;}}
        finish();
      });
    });
  });
}
function genReport(){
  if(!Object.keys(S.mktData).length){notify('Fetch market data first.',GOLD);return;}
  if(!S.apiKey){notify('Add Gemini API key in Platforms.',GOLD);return;}
  notify('Generating briefing...',PURPLE);S.mktReport='';
  var sum=Object.keys(S.mktData).map(function(k){var d=S.mktData[k];var p=pivots(d.h,d.l,d.c);return ({ES:'S&P500',NQ:'NASDAQ',XAU:'Gold'}[k]||k)+' price:'+f2(d.price)+' ('+d.change+'%) OHLC:'+f2(d.o)+'/'+f2(d.h)+'/'+f2(d.l)+'/'+f2(d.c)+' PP:'+f2(p.pp)+' R1:'+f2(p.r1)+' S1:'+f2(p.s1);}).join('\n');
  geminiCall('You are JARVIS market intelligence. Sharp briefing per asset, key levels, one trade idea. Say Sir once.',
    [{role:'user',parts:[{text:sum}]}],
    function(data){S.mktReport=geminiText(data)||'Analysis unavailable.';speak(S.mktReport.replace(/[#*]/g,'').slice(0,600),null);if(S.view==='markets')navigate('markets');},
    function(err){S.mktReport='Error: '+err;if(S.view==='markets')navigate('markets');}
  );
}
