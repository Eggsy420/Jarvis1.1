const fmtU=function(n){var v=Number(n)||0;return(v>=0?"+":"-")+"$"+Math.abs(v).toFixed(2);};

function pivots(h,l,c){var pp=(h+l+c)/3;return{pp:pp,r1:2*pp-l,r2:pp+(h-l),r3:h+2*(pp-l),s1:2*pp-h,s2:pp-(h-l),s3:l-2*(h-pp),ch4:c+(h-l)*1.1/2,ch3:c+(h-l)*1.1/4,cl3:c-(h-l)*1.1/4,cl4:c-(h-l)*1.1/2};}
function pCSV(text){var lines=text.trim().split(/\r?\n/);if(lines.length<2)return[];var hdrs=lines[0].split(",").map(function(h){return h.replace(/"/g,"").trim();});return lines.slice(1).map(function(line){var vals=line.split(",");var row={};hdrs.forEach(function(h,i){row[h]=(vals[i]||"").replace(/"/g,"").trim();});return row;}).filter(function(r){return Object.values(r).some(function(v){return v;});});}
function r2t(row,map,plat){var keys=Object.keys(row);var get=function(cs){for(var i=0;i<cs.length;i++){if(row[cs[i]]!=null&&row[cs[i]]!=="")return row[cs[i]];}for(var j=0;j<cs.length;j++){var k=keys.find(function(h){return h.toLowerCase().indexOf(cs[j].toLowerCase().slice(0,5))>=0;});if(k&&row[k])return row[k];}return "";};var rd=get(map.direction).toLowerCase();var dir=rd.indexOf("sell")>=0||rd.indexOf("short")>=0?"SHORT":"LONG";var date=new Date().toISOString().slice(0,10);try{var d=new Date(get(map.date));if(!isNaN(d))date=d.toISOString().slice(0,10);}catch(e){}var pr=parseFloat(get(map.pnl).replace(/[^0-9.\-]/g,""));return{id:uid(),createdAt:Date.now(),symbol:get(map.symbol).toUpperCase()||"UNKNOWN",platform:plat,direction:dir,entry:get(map.entry),exit:get(map.exit),size:get(map.size),pnl:isNaN(pr)?"0":String(pr),date:date,emotions:["Calm"],setups:[],entryReason:"",exitReason:"",notes:"[Imported]"};}

// ── SHARED COMPONENTS ──────────────────────────────────────────────────────
function Panel(props){var c=props.color||"#00d4ff";return React.createElement("div",{onClick:props.onClick,style:Object.assign({border:"1px solid "+c+"22",borderRadius:14,boxShadow:"0 0 20px "+c+"0d",background:"#0f2040"},props.style||{})},props.children);}

function Spin(){return React.createElement("span",{style:{display:"inline-block",width:13,height:13,border:"2px solid #3d4f66",borderTopColor:"#00d4ff",borderRadius:"50%",animation:"jspin .7s linear infinite",verticalAlign:"middle"}});}
function Btn(props){var c=props.color||"#00d4ff";return React.createElement("button",{onClick:props.onClick,disabled:props.disabled,style:Object.assign({padding:"9px 18px",background:c+"18",border:"1px solid "+c+"55",borderRadius:8,color:c,fontWeight:700,fontSize:13,cursor:props.disabled?"not-allowed":"pointer",opacity:props.disabled?0.5:1},props.style||{})},props.children);}
function SC(props){var c=props.color||"#00d4ff";return(

);}
function MiniBar(props){var pct=props.max?clamp(Math.abs(props.value)/Math.abs(props.max)*100,0,100):0;return(<div style={{height:5,borderRadius:3,background:"#3d4f66",overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:props.color,borderRadius:3}}/></div>);}
function EqCurve(props){
  var trades=props.trades;
  if(!trades||!trades.length)return null;
  var sorted=[...trades].sort(function(a,b){return a.date.localeCompare(b.date);});
  var cum=0;
  var pts=sorted.map(function(t){cum+=safe(t.pnl);return cum;});
  var mn=Math.min.apply(null,[0].concat(pts)),mx=Math.max.apply(null,[0].concat(pts)),rng=mx-mn||1;
  var W=600,H=110,P=8;
  var px=function(i){return P+(W-P*2)*(i/Math.max(pts.length-1,1));};
  var py=function(v){return H-P-((v-mn)/rng)*(H-P*2);};
  var last=pts[pts.length-1]||0;
  var col=last>=0?"#00ff9f":"#ff3b5c";
  var line=pts.map(function(v,i){return(i===0?"M":"L")+px(i).toFixed(1)+","+py(v).toFixed(1);}).join(" ");
  var fill=line+" L"+px(pts.length-1).toFixed(1)+","+H+" L"+px(0).toFixed(1)+","+H+" Z";
  return(
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:H,display:"block"}} preserveAspectRatio="none">
      <defs><linearGradient id="ecg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity="0.3"/><stop offset="100%" stopColor={col} stopOpacity="0.02"/></linearGradient></defs>
      <line x1={P} y1={py(0).toFixed(1)} x2={W-P} y2={py(0).toFixed(1)} stroke="#3d4f66" strokeWidth="1" strokeDasharray="4,4"/>
      <path d={fill} fill="url(#ecg)"/>
      <path d={line} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round"/>
      <circle cx={px(pts.length-1).toFixed(1)} cy={py(last).toFixed(1)} r="4" fill={col}/>
    </svg>
  );
}
function CalMap(props){
  var trades=props.trades;
  var today=new Date(),yr=today.getFullYear(),mo=today.getMonth();
  var byDay={};
  (trades||[]).forEach(function(t){byDay[t.date]=(byDay[t.date]||0)+safe(t.pnl);});
  var first=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  var cells=[];
  for(var e=0;e<first;e++)cells.push(null);
  for(var d=1;d<=dim;d++)cells.push(d);
  var maxA=Math.max.apply(null,[1].concat(Object.values(byDay).map(Math.abs)));
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(function(d){return <div key={d} style={{textAlign:"center",color:"#8892a4",fontSize:9}}>{d}</div>;})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map(function(day,i){
          if(day===null)return <div key={"e"+i}/>;
          var dk=yr+"-"+pad2(mo+1)+"-"+pad2(day);
          var pnl=byDay[dk];
          var isT=day===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
          var a=pnl?clamp(Math.abs(pnl)/maxA,0.15,0.9):0;
          var bg=pnl?(pnl>0?"rgba(0,255,159,"+a+")":"rgba(255,59,92,"+a+")"):"transparent";
          return <div key={day} style={{aspectRatio:"1",borderRadius:3,background:bg,border:"1px solid "+(isT?"#00d4ff":pnl?"rgba(0,212,255,0.12)":"rgba(255,255,255,0.04)")}}/>;
        })}
      </div>
    </div>
  );
}
function MDView(props){
  var text=props.text;
  if(!text)return null;
  var lines=text.split("\n");
  return(
    <div style={{fontSize:13,lineHeight:1.75,color:"#c5d3e0"}}>
      {lines.map(function(line,i){

        if(line.startsWith("# "))  return <div key={i} style={{color:"#00ff9f",fontWeight:800,fontSize:18,marginTop:18,marginBottom:8}}>{line.slice(2)}</div>;
        if(line.startsWith("- ")||line.startsWith("* "))return <div key={i} style={{marginBottom:3,paddingLeft:14}}>{"• "+line.slice(2)}</div>;
        if(line.trim()==="")return <div key={i} style={{height:6}}/>;
        var parts=line.split(/(\*\*[^*]+\*\*)/g);
        return(
          <div key={i} style={{marginBottom:2}}>
            {parts.map(function(p,j){
              if(p.startsWith("**")&&p.endsWith("**"))return <strong key={j} style={{color:"#00d4ff"}}>{p.slice(2,-2)}</strong>;
              return <span key={j}>{p}</span>;

        );

    </div>
  );
}
function PvtTable(props){

      var priority=[
        function(v){return v.name==="Daniel (Enhanced)";},
        function(v){return v.name==="Daniel";},
        function(v){return v.name==="Arthur (Enhanced)";},
        function(v){return v.name==="Arthur";},

        function(v){return v.lang.indexOf("en-GB")===0;},
        function(v){return v.lang.indexOf("en")===0;},
      ];
      var voice=null;
      for(var pi=0;pi<priority.length;pi++){voice=allV.find(priority[pi]);if(voice)break;}

      setAutoMktStatus(ticker);

    setMktLoad(false);
  };

/g," ").slice(0,500),null);}

  const startWake=useCallback(async()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){
      notify("Wake word needs Chrome or Safari — not supported in this browser.","#ff3b5c");
      setMicStatus("error");
      return;
    }
    // Request mic permission explicitly first
    try{
      await navigator.mediaDevices.getUserMedia({audio:true});
      setMicStatus("granted");
    }catch(err){
      setMicStatus("denied");
      setWakeOn(false);
      wOn.current=false;
      notify("Microphone access denied. Allow mic in browser settings then try again.","#ff3b5c");
      return;
    }
    if(wRef.current){try{wRef.current.abort();}catch(e){}}
    const launch=()=>{
      if(!wOn.current)return;
      const r=new SR();
      r.lang="en-US";r.continuous=true;r.interimResults=true;r.maxAlternatives=1;
      wRef.current=r;
      r.onstart=()=>setMicStatus("active");
      r.onresult=e=>{
        for(let i=e.resultIndex;i<e.results.length;i++){

            setShowHUD(true);speak("Yes, Sir?",function(){listenOnce();});
            break;
          }
        }
      };
      r.onend=()=>{
        if(wOn.current){
          setMicStatus("granted");
          setTimeout(()=>{if(wOn.current)launch();},300);
        }else{
          setMicStatus("unknown");
        }
      };
      r.onerror=e=>{
        if(e.error==="not-allowed"||e.error==="service-not-allowed"){
          setMicStatus("denied");
          setWakeOn(false);
          wOn.current=false;
          notify("Mic access denied. Check browser settings.","#ff3b5c");
        }else if(e.error==="network"){

          notify("Network error with speech service. Check internet connection.","#ff3b5c");
        }else if(e.error!=="aborted"&&e.error!=="no-speech"){

        }
      };

    };

          <div style={{textAlign:"center",marginBottom:10,padding:"8px 14px",borderRadius:8,background:micStatus==="active"?"rgba(0,255,159,0.1)":micStatus==="denied"?"rgba(255,59,92,0.1)":micStatus==="error"?"rgba(245,166,35,0.1)":"rgba(0,0,0,0.2)",border:"1px solid "+(micStatus==="active"?"rgba(0,255,159,0.3)":micStatus==="denied"?"rgba(255,59,92,0.3)":micStatus==="error"?"rgba(245,166,35,0.3)":"rgba(0,212,255,0.15)")}}>
            <div style={{fontSize:13,fontWeight:700,color:micStatus==="active"?"#00ff9f":micStatus==="denied"?"#ff3b5c":micStatus==="error"?"#f5a623":micStatus==="granted"?"#00d4ff":"#8892a4"}}>
              {micStatus==="active"?"🎙 LISTENING FOR HEY JARVIS…":micStatus==="denied"?"🚫 MICROPHONE BLOCKED":micStatus==="error"?"⚠ MIC ERROR — CHECK CONNECTION":micStatus==="granted"?"✓ MIC READY — STARTING…":"🎤 MICROPHONE INACTIVE"}
            </div>
            {micStatus==="denied"&&<div style={{fontSize:11,color:"#8892a4",marginTop:5}}>Go to browser Settings → Privacy → Microphone → Allow for this site</div>}
            {micStatus==="active"&&<div style={{fontSize:11,color:"#8892a4",marginTop:4}}>Say "Hey JARVIS" or just "JARVIS" clearly</div>}
            {micStatus==="unknown"&&!wakeOn&&<div style={{fontSize:11,color:"#8892a4",marginTop:4}}>Tap Enable Wake Word below to start</div>}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={toggleWake} style={{padding:"9px 18px",background:wakeOn?"rgba(0,255,159,0.12)":"rgba(0,212,255,0.1)",border:"1px solid "+(wakeOn?"rgba(0,255,159,0.3)":"rgba(0,212,255,0.3)"),borderRadius:8,color:wakeOn?"#00ff9f":"#00d4ff",fontWeight:600,fontSize:13}}>{wakeOn?(micStatus==="active"?"🎙 LIVE — Tap to stop":"🔄 Connecting mic…"):"🎤 Enable Wake Word"}</button>
            <button onClick={()=>setMuted(function(m){return !m;})} style={{padding:"9px 14px",background:muted?"rgba(255,59,92,0.1)":"rgba(0,212,255,0.08)",border:"1px solid "+(muted?"rgba(255,59,92,0.3)":"rgba(0,212,255,0.2)"),borderRadius:8,color:muted?"#ff3b5c":"#8892a4",fontWeight:600,fontSize:13}}>{muted?"🔇 Unmute":"🔊 Mute"}</button>
          </div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",justifyContent:"center",marginBottom:14}}>
            {["Market briefing","Show dashboard","My stats","Open journal","Log a trade"].map(function(c){return(
              <button key={c} onClick={()=>{hvcmd(c);setVPanel(false);}} style={{padding:"6px 12px",background:"rgba(0,212,255,0.08)",border:"1px solid rgba(0,212,255,0.25)",borderRadius:20,color:"#00d4ff",fontSize:11}}>
                {'"'+c+'"'}
              </button>
            );})}
          </div>
          <div style={{textAlign:"center",marginBottom:12}}>
            <button onClick={listenOnce} style={{padding:"9px 20px",background:"rgba(180,91,255,0.15)",border:"1px solid rgba(180,91,255,0.35)",borderRadius:8,color:"#b45bff",fontWeight:600,fontSize:13}}>

            </button>
            <div style={{color:"#8892a4",fontSize:11,marginTop:5}}>Use this if wake word is not working</div>
          </div>
          {vLog.slice(-4).reverse().map(function(l,i){return(
            <div key={i} style={{padding:"7px 10px",marginBottom:3,borderRadius:8,background:l.who==="user"?"rgba(0,212,255,0.08)":"rgba(0,255,159,0.05)",borderLeft:"3px solid "+(l.who==="user"?"#00d4ff":"#00ff9f"),fontSize:12}}>
              <span style={{color:l.who==="user"?"#00d4ff":"#00ff9f",fontWeight:700,marginRight:6}}>{l.who==="user"?"You":"JARVIS"}</span>
              <span style={{color:"#c5d3e0"}}>{l.msg}</span>
            </div>
          );})}
        </div>
      )}

      {/* MOBILE FAB */}
      {mob&&(
        <div style={{position:"fixed",bottom:16,right:16,zIndex:300}}>
          <button onClick={()=>setVPanel(function(v){return !v;})} style={{width:50,height:50,borderRadius:"50%",background:vState!=="idle"?"rgba(0,255,159,0.2)":"rgba(0,212,255,0.15)",border:"2px solid "+(vState!=="idle"?"#00ff9f":"#00d4ff"),fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(0,212,255,0.3)"}}>
            {vState==="listening"?"🎙":vState!=="idle"?"⬡":"🎤"}
          </button>
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{maxWidth:1400,margin:"0 auto",padding:mob?"14px 10px":"22px 18px",paddingBottom:mob?100:40}}>
        {/* DASHBOARD */}
        {view==="dashboard"&&(
          <div style={{animation:"jfade .4s ease"}}>
            <div style={{marginBottom:18}}>
              <div style={{fontSize:mob?20:24,fontWeight:800}}>Good {greet}, Sir.</div>
              <div style={{color:"#8892a4",marginTop:4,fontSize:13}}>{trades.length?trades.length+" trades · say Hey JARVIS to activate voice":"No trades yet. Log or sync to get started."}</div>
            </div>
            {!stats?(
              <Panel style={{padding:44,textAlign:"center"}}>
                <div style={{fontSize:40,marginBottom:12}}>◈</div>
                <div style={{color:"#00d4ff",fontSize:16,fontWeight:700,marginBottom:16}}>No data yet, Sir.</div>
                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                  <Btn onClick={()=>setView("log")} color="#00d4ff">✦ Log Trade</Btn>
                  <Btn onClick={()=>setView("sync")} color="#00ff9f">⟳ Sync</Btn>
                  <Btn onClick={()=>setView("markets")} color="#ffd700">📡 Markets</Btn>
                </div>
              </Panel>
            ):(
              <div>
                <Panel color={stats.tot>=0?"#00ff9f":"#ff3b5c"} style={{padding:mob?"14px":"18px 24px",marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:10}}>
                    <div>
                      <Lbl>Total P&L</Lbl>
                      <div style={{fontSize:mob?28:36,fontWeight:900,fontFamily:"monospace",color:stats.tot>=0?"#00ff9f":"#ff3b5c"}}>{fmtU(stats.tot)}</div>
                    </div>
                    <div style={{display:"flex",gap:mob?12:20,flexWrap:"wrap"}}>
                      <div><Lbl>Win Rate</Lbl><div style={{color:parseFloat(stats.wr)>=50?"#00ff9f":"#ff3b5c",fontSize:mob?18:22,fontWeight:800}}>{stats.wr}%</div></div>
                      <div><Lbl>Streak</Lbl><div style={{color:stats.ct?"#00ff9f":"#ff3b5c",fontSize:mob?18:22,fontWeight:800}}>{stats.cs}{stats.ct?"W":"L"}</div></div>
                      <div><Lbl>Max DD</Lbl><div style={{color:"#f5a623",fontSize:mob?18:22,fontWeight:800}}>{fmtU(stats.mdd)}</div></div>
                    </div>
                  </div>
                  <EqCurve trades={trades}/>
                </Panel>
                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  <SC tiny={mob} label="Avg Win" value={fmtU(stats.aw)} sub={stats.wins+"W"} color="#00ff9f"/>
                  <SC tiny={mob} label="Avg Loss" value={fmtU(Math.abs(stats.al))} sub={stats.losses+"L"} color="#ff3b5c"/>
                  <SC tiny={mob} label="R/R" value={stats.rr.toFixed(2)+"R"} color={stats.rr>=1?"#00ff9f":"#f5a623"}/>
                  <SC tiny={mob} label="Prof Factor" value={stats.pf.toFixed(2)} color={stats.pf>=1.5?"#00ff9f":"#f5a623"}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:mob?"1fr":tab?"1fr 1fr":"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                  <Panel color="#00ff9f" style={{padding:"14px 16px"}}>
                    <Lbl>🏆 Best Day</Lbl>
                    <div style={{color:"#00ff9f",fontSize:18,fontWeight:800,fontFamily:"monospace"}}>{fmtU(stats.best?stats.best[1]:0)}</div>
                    <div style={{color:"#8892a4",fontSize:11,marginTop:3}}>{stats.best?dstr(stats.best[0]):"—"}</div>
                  </Panel>
                  <Panel color="#ff3b5c" style={{padding:"14px 16px"}}>
                    <Lbl>📉 Worst Day</Lbl>
                    <div style={{color:"#ff3b5c",fontSize:18,fontWeight:800,fontFamily:"monospace"}}>{fmtU(stats.worst?stats.worst[1]:0)}</div>
                    <div style={{color:"#8892a4",fontSize:11,marginTop:3}}>{stats.worst?dstr(stats.worst[0]):"—"}</div>
                  </Panel>
                  <Panel style={{padding:"14px 16px"}}><Lbl>📅 This Month</Lbl><CalMap trades={trades}/></Panel>
                </div>
                <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:10,marginBottom:10}}>
                  <Panel style={{padding:"14px 16px"}}>
                    <Lbl>◈ Top Instruments</Lbl>
                    {Object.entries(stats.bySym).sort(function(a,b){return Math.abs(b[1].pnl)-Math.abs(a[1].pnl);}).slice(0,5).map(function(entry){
                      const sym=entry[0],d=entry[1];
                      return(
                        <div key={sym} style={{marginBottom:9}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontWeight:700,fontSize:13}}>{sym}</span>
                            <span style={{color:d.pnl>=0?"#00ff9f":"#ff3b5c",fontFamily:"monospace",fontWeight:700,fontSize:13}}>{fmtU(d.pnl)}</span>
                          </div>
                          <MiniBar value={d.pnl} max={Math.max(1,...Object.values(stats.bySym).map(function(x){return Math.abs(x.pnl);}))} color={d.pnl>=0?"#00ff9f":"#ff3b5c"}/>
                          <div style={{color:"#8892a4",fontSize:10,marginTop:2}}>{d.count+" trades · "+((d.wins/d.count)*100).toFixed(0)+"% WR"}</div>
                        </div>
                      );
                    })}
                  </Panel>
                  <Panel style={{padding:"14px 16px"}}>
                    <Lbl>◆ Emotion P&L</Lbl>
                    {Object.entries(stats.byE).sort(function(a,b){return b[1].pnl-a[1].pnl;}).map(function(entry){
                      const em=entry[0],d=entry[1];
                      const emo=EMOTIONS.find(function(x){return x.label===em;})||{icon:"?",color:"#8892a4"};
                      return(
                        <div key={em} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                          <span style={{width:18,flexShrink:0}}>{emo.icon}</span>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                              <span style={{fontSize:12,fontWeight:600}}>{em}</span>
                              <span style={{color:d.pnl>=0?"#00ff9f":"#ff3b5c",fontSize:12,fontFamily:"monospace"}}>{fmtU(d.pnl)}</span>
                            </div>
                            <MiniBar value={d.pnl} max={Math.max(1,...Object.values(stats.byE).map(function(x){return Math.abs(x.pnl);}))} color={d.pnl>=0?emo.color:"#ff3b5c"}/>
                          </div>
                          <span style={{color:"#8892a4",fontSize:10,width:22,textAlign:"right",flexShrink:0}}>{d.count+"×"}</span>
                        </div>
                      );
                    })}
                  </Panel>
                </div>
                <Panel style={{padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <Lbl>◉ Recent Trades</Lbl>
                    <button onClick={()=>setView("history")} style={{background:"none",border:"none",color:"#00d4ff",fontSize:12}}>All →</button>
                  </div>
                  {trades.slice(0,6).map(function(t){
                    const emo=EMOTIONS.find(function(e){return e.label===t.emotion;})||{icon:"?"};
                    return(
                      <div key={t.id} className="jrow" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 7px",marginBottom:2,cursor:"pointer"}} onClick={()=>setView("history")}>
                        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                          <Badge text={t.direction} color={t.direction==="LONG"?"#00ff9f":"#ff3b5c"}/>
                          <span style={{fontWeight:700,fontSize:13}}>{t.symbol}</span>
                          {!mob&&t.setup&&<Badge text={t.setup} color="#b45bff"/>}
                          <span style={{color:"#8892a4",fontSize:11}}>{t.date}</span>
                          <span>{emo.icon}</span>
                        </div>
                        <span style={{color:safe(t.pnl)>=0?"#00ff9f":"#ff3b5c",fontWeight:800,fontFamily:"monospace",flexShrink:0}}>{fmtU(safe(t.pnl))}</span>
                      </div>
                    );
                  })}
                </Panel>
              </div>
            )}
          </div>
        )}

        {/* ANALYTICS */}
        {view==="analytics"&&(
          <div style={{animation:"jfade .4s ease"}}>
            <div style={{fontSize:19,fontWeight:800,color:"#00d4ff",marginBottom:16}}>📊 Analytics</div>
            {!stats?(
              <Panel style={{padding:36,textAlign:"center",color:"#8892a4"}}>No data yet.</Panel>
            ):(
              <div>
                <Panel style={{padding:"16px 18px",marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
                    <Lbl>Equity Curve</Lbl>
                    <div style={{display:"flex",gap:6}}>
                      {["all","30d","7d"].map(function(p){return(
                        <button key={p} onClick={()=>setChartP(p)} style={{padding:"5px 10px",borderRadius:20,border:"1px solid "+(chartP===p?"#00d4ff":"#3d4f66"),background:chartP===p?"rgba(0,212,255,0.15)":"transparent",color:chartP===p?"#00d4ff":"#8892a4",fontSize:11,fontWeight:600}}>{p==="all"?"All":p}</button>
                      );})}
                    </div>
                  </div>
                  <EqCurve trades={chartP==="all"?trades:chartP==="30d"?trades.filter(function(t){return t.date>=new Date(Date.now()-30*864e5).toISOString().slice(0,10);}):trades.filter(function(t){return t.date>=new Date(Date.now()-7*864e5).toISOString().slice(0,10);})}/>
                  <div style={{display:"flex",gap:16,marginTop:10,paddingTop:10,borderTop:"1px solid rgba(0,212,255,0.12)",flexWrap:"wrap"}}>
                    {[{l:"Return",v:fmtU(stats.tot),c:stats.tot>=0?"#00ff9f":"#ff3b5c"},{l:"Max DD",v:fmtU(stats.mdd),c:"#ff3b5c"},{l:"Best",v:fmtU(Math.max(...trades.map(function(t){return safe(t.pnl);}))),c:"#00ff9f"},{l:"Worst",v:fmtU(Math.min(...trades.map(function(t){return safe(t.pnl);}))),c:"#ff3b5c"},{l:"PF",v:stats.pf.toFixed(2),c:"#f5a623"}].map(function(x){return(
                      <div key={x.l}>
                        <div style={{color:"#8892a4",fontSize:10,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{x.l}</div>
                        <div style={{color:x.c,fontWeight:700,fontFamily:"monospace",fontSize:13}}>{x.v}</div>
                      </div>
                    );})}
                  </div>
                </Panel>
                <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:10,marginBottom:10}}>
                  <Panel style={{padding:"14px 16px"}}>
                    <Lbl>✦ Setup Performance</Lbl>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:260}}>
                        <thead><tr style={{color:"#8892a4",fontSize:10}}>{["Setup","Trades","Win%","P&L"].map(function(h){return <th key={h} style={{padding:"5px 7px",borderBottom:"1px solid rgba(0,212,255,0.12)"}}>{h}</th>;})}</tr></thead>
                        <tbody>{Object.entries(stats.byS).sort(function(a,b){return b[1].pnl-a[1].pnl;}).map(function(entry){
                          const s=entry[0],d=entry[1];
                          return <tr key={s} className="jrow"><td style={{padding:"6px 7px",fontWeight:600}}>{s}</td><td style={{padding:"6px 7px",color:"#8892a4"}}>{d.count}</td><td style={{padding:"6px 7px",color:d.wins/d.count>=.5?"#00ff9f":"#ff3b5c"}}>{((d.wins/d.count)*100).toFixed(0)+"%"}</td><td style={{padding:"6px 7px",color:d.pnl>=0?"#00ff9f":"#ff3b5c",fontFamily:"monospace",fontWeight:700}}>{fmtU(d.pnl)}</td></tr>;
                        })}</tbody>
                      </table>
                    </div>
                  </Panel>
                  <Panel style={{padding:"14px 16px"}}>
                    <Lbl>😤 Emotion vs P&L</Lbl>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:260}}>
                        <thead><tr style={{color:"#8892a4",fontSize:10}}>{["Emotion","Trades","Win%","P&L"].map(function(h){return <th key={h} style={{padding:"5px 7px",borderBottom:"1px solid rgba(0,212,255,0.12)"}}>{h}</th>;})}</tr></thead>
                        <tbody>{Object.entries(stats.byE).sort(function(a,b){return b[1].pnl-a[1].pnl;}).map(function(entry){
                          const em=entry[0],d=entry[1];
                          const emo=EMOTIONS.find(function(x){return x.label===em;})||{icon:"?"};
                          return <tr key={em} className="jrow"><td style={{padding:"6px 7px",fontWeight:600}}>{emo.icon+" "+em}</td><td style={{padding:"6px 7px",color:"#8892a4"}}>{d.count}</td><td style={{padding:"6px 7px",color:d.wins/d.count>=.5?"#00ff9f":"#ff3b5c"}}>{((d.wins/d.count)*100).toFixed(0)+"%"}</td><td style={{padding:"6px 7px",color:d.pnl>=0?"#00ff9f":"#ff3b5c",fontFamily:"monospace",fontWeight:700}}>{fmtU(d.pnl)}</td></tr>;
                        })}</tbody>
                      </table>
                    </div>
                  </Panel>
                </div>
                <Panel style={{padding:"14px 16px",marginBottom:10}}>
                  <Lbl>◈ Instruments</Lbl>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8}}>
                    {Object.entries(stats.bySym).sort(function(a,b){return b[1].pnl-a[1].pnl;}).map(function(entry){
                      const sym=entry[0],d=entry[1];
                      return(
                        <Panel key={sym} color={d.pnl>=0?"#00ff9f":"#ff3b5c"} style={{padding:"11px 13px"}}>
                          <div style={{fontWeight:800,fontSize:13,marginBottom:3}}>{sym}</div>
                          <div style={{color:d.pnl>=0?"#00ff9f":"#ff3b5c",fontWeight:700,fontFamily:"monospace",fontSize:12}}>{fmtU(d.pnl)}</div>
                          <div style={{color:"#8892a4",fontSize:10,marginTop:2}}>{d.count+"× · "+((d.wins/d.count)*100).toFixed(0)+"% WR"}</div>
                        </Panel>
                      );
                    })}
                  </div>
                </Panel>
                <Panel style={{padding:"14px 16px"}}><Lbl>📅 Calendar</Lbl><CalMap trades={trades}/></Panel>
              </div>
            )}
          </div>
        )}

        {/* LOG TRADE */}
        {view==="log"&&(
          <div style={{animation:"jfade .4s ease",maxWidth:680,margin:"0 auto"}}>
            <div style={{fontSize:19,fontWeight:800,color:"#00d4ff",marginBottom:16}}>{editId?"✎ Edit Trade":"✦ Log New Trade"}</div>
            <Panel style={{padding:mob?"16px":"22px 26px"}}>
              <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:12,marginBottom:12}}>
                <div><Lbl>Date</Lbl><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
                <div><Lbl>Symbol *</Lbl><input placeholder="EURUSD, NQ, BTC…" value={form.symbol} onChange={e=>setForm(f=>({...f,symbol:e.target.value.toUpperCase()}))}/></div>
                <div>
                  <Lbl>Platform</Lbl>
                  <select value={form.platform} onChange={function(e){setForm(function(f){return {...f,platform:e.target.value};});}}>
                    {PLATFORMS.map(function(p){return <option key={p}>{p}</option>;})}
                    <optgroup label="Prop Firms">{PROP_FIRMS.map(function(p){return <option key={p.name}>{p.name}</option>;})}</optgroup>
                  </select>
                </div>
                <div>
                  <Lbl>Direction</Lbl>
                  <select value={form.direction} onChange={function(e){setForm(function(f){return {...f,direction:e.target.value};});}}>
                    <option>LONG</option><option>SHORT</option>
                  </select>
                </div>
                <div><Lbl>Entry</Lbl><input type="number" step="any" placeholder="0.00" value={form.entry} onChange={function(e){setForm(function(f){return {...f,entry:e.target.value};});}}/></div>
                <div><Lbl>Exit</Lbl><input type="number" step="any" placeholder="0.00" value={form.exit} onChange={function(e){setForm(function(f){return {...f,exit:e.target.value};});}}/></div>
                <div><Lbl>Size / Lots</Lbl><input type="number" step="any" placeholder="0.01" value={form.size} onChange={function(e){setForm(function(f){return {...f,size:e.target.value};});}}/></div>
                <div><Lbl>P&L ($) *</Lbl><input type="number" step="any" placeholder="+250 or -80" value={form.pnl} onChange={function(e){setForm(function(f){return {...f,pnl:e.target.value};});}}/></div>
              </div>
              <div style={{marginBottom:12}}>
                <Lbl>How were you feeling? (tap all that apply)</Lbl>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {EMOTIONS.map(function(em){var sel=(form.emotions||[]).indexOf(em.label)>=0;return(<button key={em.label} onClick={function(){setForm(function(f){var arr=f.emotions||[];return Object.assign({},f,{emotions:sel?arr.filter(function(x){return x!==em.label;}):[...arr,em.label]});});}} style={{padding:"6px 11px",borderRadius:20,border:"2px solid "+(sel?em.color:"#3d4f66"),background:sel?em.color+"25":"transparent",color:sel?em.color:"#8892a4",fontSize:12,fontWeight:600}}>{em.icon+" "+em.label}{sel?" ✓":""}</button>);})}
                </div>
                {(form.emotions||[]).length===0&&<div style={{color:"#ff3b5c",fontSize:11,marginTop:4}}>Select at least one emotion</div>}
              </div>
              <div style={{marginBottom:12}}>
                <Lbl>Setup tags (tap all that apply)</Lbl>

                <button onClick={listenOnce} style={{padding:"9px 11px",background:"rgba(180,91,255,0.15)",border:"1px solid rgba(180,91,255,0.3)",borderRadius:8,color:"#b45bff",fontSize:14}}>{vState==="listening"?<Spin/>:"🎙"}</button>
                <button onClick={()=>setAiChat([])} style={{padding:"9px 10px",background:"rgba(255,59,92,0.1)",border:"1px solid rgba(255,59,92,0.25)",borderRadius:8,color:"#ff3b5c",fontSize:12}}>✕</button>
                <Btn onClick={()=>askJ()} disabled={aiLoad} color="#00d4ff">◆</Btn>
              </div>
            </Panel>
          </div>
        )}

        {/* MARKETS */}
        {view==="markets"&&(
          <div style={{animation:"jfade .4s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:19,fontWeight:800,color:"#ffd700"}}>📡 Market Intelligence</div>
                <div style={{color:"#8892a4",fontSize:13,marginTop:4}}>Live data · Classic & Camarilla pivots · JARVIS briefing</div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <Btn onClick={fetchMkt} disabled={mktLoad} color="#00d4ff" style={{fontSize:12}}>{mktLoad?<span><Spin/> Fetching…</span>:"⟳ Fetch Live Data"}</Btn>
                <Btn onClick={genReport} disabled={mktRLoad||!Object.keys(mktData).length} color="#ffd700" style={{fontSize:12}}>{mktRLoad?<span><Spin/> Analyzing…</span>:"◆ Generate Briefing"}</Btn>
              </div>
            </div>
            {!Object.keys(mktData).length&&!mktLoad&&(
              <Panel style={{padding:"40px",textAlign:"center",marginBottom:14}}>
                <div style={{fontSize:40,marginBottom:14}}>📡</div>
                <div style={{color:"#ffd700",fontWeight:700,fontSize:16,marginBottom:8}}>JARVIS Market Intelligence</div>
                <div style={{color:"#8892a4",fontSize:13,marginBottom:20}}>Fetch live OHLC for ES, NQ and XAUUSD. JARVIS calculates pivot points and speaks a full market briefing.</div>
                <Btn onClick={fetchMkt} color="#ffd700" style={{fontSize:14}}>📡 Fetch Live Data</Btn>
              </Panel>
            )}
            {mktErr&&<Panel color="#ff3b5c" style={{padding:"14px 16px",marginBottom:12}}><div style={{color:"#ff3b5c",fontSize:13}}>{mktErr}</div></Panel>}
            <div style={{display:"grid",gridTemplateColumns:mob?"1fr":tab?"1fr 1fr":"1fr 1fr 1fr",gap:12,marginBottom:14}}>
              {MASSETS.map(function(asset){
                const d=mktData[asset.key];
                return(
                  <Panel key={asset.key} color={asset.color} style={{padding:"16px 18px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div>
                        <div style={{fontSize:11,color:"#8892a4",letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>{asset.icon+" "+asset.label}</div>
                        <div style={{fontSize:22,fontWeight:800,fontFamily:"monospace",color:asset.color}}>{d?f2(d.price):"—"}</div>
                        {d&&<div style={{fontSize:12,color:d.change>=0?"#00ff9f":"#ff3b5c",fontWeight:700,marginTop:2}}>{(d.change>=0?"+":"")+f2(d.change)+"%"}</div>}
                      </div>
                      <div style={{fontSize:28}}>{asset.icon}</div>
                    </div>
                    {d?(
                      <PvtTable ohlc={d} color={asset.color}/>
                    ):(
                      <div style={{color:"#8892a4",fontSize:12,textAlign:"center",padding:"20px 0"}}>Click Fetch Live Data to load</div>
                    )}
                  </Panel>
                );
              })}
            </div>
            {mktReport&&(
              <Panel style={{padding:"20px 24px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
                  <div style={{fontSize:16,fontWeight:800,color:"#ffd700"}}>◆ JARVIS Market Briefing</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>speak(mktReport.replace(/[#*]/g,"").slice(0,800))} style={{padding:"7px 14px",background:"rgba(0,212,255,0.1)",border:"1px solid rgba(0,212,255,0.3)",borderRadius:7,color:"#00d4ff",fontSize:12,fontWeight:600,cursor:"pointer"}}>🔊 Read Aloud</button>
                    <button onClick={genReport} disabled={mktRLoad} style={{padding:"7px 14px",background:"rgba(255,215,0,0.1)",border:"1px solid rgba(255,215,0,0.3)",borderRadius:7,color:"#ffd700",fontSize:12,fontWeight:600,cursor:"pointer"}}>⟳ Refresh</button>
                  </div>
                </div>
                <div style={{borderTop:"1px solid rgba(0,212,255,0.12)",paddingTop:16}}>
                  <MDView text={mktReport}/>
                </div>
              </Panel>
            )}
          </div>
        )}

        {/* PLATFORMS */}
        {view==="connect"&&(
          <div style={{animation:"jfade .4s ease",maxWidth:860,margin:"0 auto"}}>
            <div style={{fontSize:19,fontWeight:800,color:"#00d4ff",marginBottom:16}}>⬡ Platforms & Voice</div>
            <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:12,marginBottom:12}}>
              <Panel style={{padding:"18px 20px"}}>
                <Lbl>🔌 Linked Accounts</Lbl>
                {accts.length===0?(
                  <div style={{color:"#8892a4",fontSize:12,marginBottom:12}}>No accounts linked yet.</div>
                ):(
                  <div style={{marginBottom:12}}>
                    {accts.map(function(a){return(
                      <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(0,212,255,0.04)",border:"1px solid rgba(0,212,255,0.12)",borderRadius:8,padding:"10px 14px",marginBottom:7}}>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700,fontSize:13}}>{a.nickname}</div>
                          <div style={{color:"#8892a4",fontSize:11,marginTop:1}}>{a.platform+" · "+a.accountId}</div>
                        </div>
                        <button onClick={()=>setAccts(function(ac){return ac.filter(function(x){return x.id!==a.id;});})} style={{background:"none",border:"none",color:"#ff3b5c",cursor:"pointer",fontSize:14}}>✕</button>
                      </div>
                    );})}
                  </div>
                )}
                <Lbl>Add Account</Lbl>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <input placeholder="Nickname" value={newA.nickname} onChange={function(e){setNewA(function(a){return {...a,nickname:e.target.value};});}}/>
                  <select value={newA.platform} onChange={function(e){setNewA(function(a){return {...a,platform:e.target.value};});}}>{PLATFORMS.map(function(p){return <option key={p}>{p}</option>;})}</select>
                  <input placeholder="Account ID / login" value={newA.accountId} onChange={function(e){setNewA(function(a){return {...a,accountId:e.target.value};});}}/>
                  <Btn onClick={function(){if(!newA.nickname||!newA.accountId){notify("Nickname and ID required.","#ff3b5c");return;}setAccts(function(a){return [...a,{...newA,id:uid()}];});setNewA({nickname:"",platform:"MT4/MT5",accountId:""});notify("Account linked.","#00ff9f");}} color="#00d4ff">⬡ Link Account</Btn>
                </div>
              </Panel>
              <Panel style={{padding:"18px 20px"}}>
                <Lbl>🎙 Voice Settings</Lbl>
                <div style={{display:"flex",flexDirection:"column",gap:14,marginTop:10}}>
                  <div style={{background:"rgba(0,255,159,0.05)",border:"1px solid rgba(0,255,159,0.2)",borderRadius:8,padding:"12px 14px"}}>
                    <div style={{color:"#00ff9f",fontWeight:700,fontSize:13,marginBottom:6}}>🔊 JARVIS speaks every reply</div>
                    <div style={{color:"#8892a4",fontSize:12,lineHeight:1.7}}>
                      For the best voice per platform:<br/>
                      Mac/Safari → System Preferences → Accessibility → choose Daniel (British)<br/>
                      Windows/Edge → Microsoft David works great<br/>
                      iPad → Settings → Accessibility → Spoken Content → Daniel or Arthur
                    </div>
                  </div>
                  {[{l:"Wake Word",desc:'Say "Hey JARVIS" hands-free',on:wakeOn,fn:toggleWake},{l:"Mute Voice",desc:"Stop JARVIS speaking",on:muted,fn:()=>setMuted(function(m){return !m;})}].map(function(item){return(
                    <div key={item.l} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{item.l}</div>
                        <div style={{color:"#8892a4",fontSize:11,marginTop:2}}>{item.desc}</div>
                      </div>
                      <div onClick={item.fn} style={{width:44,height:24,borderRadius:12,background:item.on?"#00d4ff":"rgba(255,255,255,0.1)",cursor:"pointer",position:"relative"}}>
                        <div style={{position:"absolute",top:3,left:item.on?22:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.3s"}}/>
                      </div>
                    </div>
                  );})}
                  <Btn onClick={()=>speak("Good day, Sir. All JARVIS systems are fully operational. Market intelligence, journal, and voice are online.")} color="#f5a623">🔊 Test JARVIS Voice</Btn>
                </div>
              </Panel>
            </div>
            <Panel color="#b45bff" style={{padding:"18px 20px"}}>
              <Lbl>🏢 Prop Firm Directory</Lbl>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8,marginTop:10}}>
                {PROP_FIRMS.map(function(pf){return(
                  <div key={pf.name} onClick={()=>setChForm(function(f){return {...f,firm:pf.name,maxDD:String(pf.maxDD),dailyDD:String(pf.dailyDD),target:String(pf.target)};})} style={{background:pf.color+"0d",border:"1px solid "+pf.color+"30",borderRadius:8,padding:"10px 12px",cursor:"pointer"}} onMouseEnter={function(e){e.currentTarget.style.background=pf.color+"1c";}} onMouseLeave={function(e){e.currentTarget.style.background=pf.color+"0d";}}>
                    <div style={{fontWeight:700,fontSize:12,marginBottom:4,color:"#dde6f0"}}>{pf.name}</div>
                    <div style={{color:pf.color,fontSize:10,lineHeight:1.8}}>{"Max DD: "+pf.maxDD+"% · Daily: "+pf.dailyDD+"% · Target: "+pf.target+"%"}</div>
                  </div>
                );})}
              </div>
            </Panel>
          </div>
        )}

      </div>
      <div style={{textAlign:"center",padding:"16px",color:"#3d4f66",fontSize:9,letterSpacing:2}}>J.A.R.V.I.S TRADING INTELLIGENCE v7 · SAY HEY JARVIS TO ACTIVATE</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(JARVIS,null));
setTimeout(function(){if(window.__hideSplash)window.__hideSplash();},1200);
</script>
</body>
</html>
