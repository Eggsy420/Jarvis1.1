function fmtU(v){var n=parseFloat(v)||0;return(n>=0?'+$':'- $')+Math.abs(n).toFixed(2);}
function pivots(h,l,c){
  var pp=(h+l+c)/3,r1=2*pp-l,r2=pp+(h-l),r3=h+2*(pp-l);
  var s1=2*pp-h,s2=pp-(h-l),s3=l-2*(h-pp);
  var range=h-l;
  return{pp:pp,r1:r1,r2:r2,r3:r3,s1:s1,s2:s2,s3:s3,ch4:c+range*1.1/2,ch3:c+range*1.1/4,cl3:c-range*1.1/4,cl4:c-range*1.1/2};
}

// ── GEMINI API ────────────────────────────────────────────────────────────
function geminiCall(apiKey, systemText, contents) {
  if(!apiKey) {
    var err = new Error('NO_KEY'); err.noKey=true; return Promise.reject(err);
  }
  var allContents = [];
  if(systemText) {
    allContents.push({role:'user',parts:[{text:'Instructions: '+systemText}]});
    allContents.push({role:'model',parts:[{text:'Understood Sir.'}]});
  }
  for(var i=0;i<contents.length;i++) allContents.push(contents[i]);
  var body = {contents:allContents, generationConfig:{maxOutputTokens:1200,temperature:0.7}};
  var models = ['gemini-1.5-flash','gemini-1.5-flash-latest','gemini-pro'];
  function tryModel(idx) {
    if(idx>=models.length) return Promise.reject(new Error('All models failed'));
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/'+models[idx]+':generateContent?key='+encodeURIComponent(apiKey);
    return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){return r.text().then(function(t){
        var d; try{d=JSON.parse(t);}catch(ex){throw new Error('Parse error: '+t.slice(0,80));}
        if(!r.ok) {
          var msg=(d&&d.error&&d.error.message)||('HTTP '+r.status);
          if(r.status===404||r.status===400) return tryModel(idx+1);
          throw new Error(msg);
        }
        return d;
      });})
      .catch(function(ex){ if(idx<models.length-1) return tryModel(idx+1); throw ex; });
  }
  return tryModel(0);
}
function geminiText(data) {
  try{
    var parts=(data.candidates[0].content.parts)||[];
    return parts.filter(function(p){return p.text;}).map(function(p){return p.text;}).join(' ').trim();
  }catch(e){return '';}
}

// ── EQUITY CURVE ─────────────────────────────────────────────────────────
function EqCurve(props) {
  var trades=props.trades||[];
  if(trades.length<2) return e('div',{style:{color:'#3d4f66',fontSize:11,padding:'20px',textAlign:'center'}},'Add trades to see equity curve');
  var pts=[];var running=0;
  var sorted=[].concat(trades).reverse();
  for(var i=0;i<sorted.length;i++){running+=safe(sorted[i].pnl);pts.push(running);}
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts);
  var range=mx-mn||1,W=300,H=60;
  var coords=pts.map(function(v,i){
    return (i/(pts.length-1)*W).toFixed(1)+','+(H-(v-mn)/range*H).toFixed(1);
  });
  var col=pts[pts.length-1]>=0?GREEN:RED;
  return e('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:60,display:'block'}},
    e('polyline',{points:coords.join(' '),fill:'none',stroke:col,strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'}),
    e('polyline',{points:'0,'+H+' '+coords.join(' ')+' '+W+','+H,fill:col+'15',stroke:'none'})
  );
}

// ── CALENDAR HEATMAP ─────────────────────────────────────────────────────
function CalMap(props) {
  var trades=props.trades||[];
  var now=new Date();
  var y=now.getFullYear(),m=now.getMonth();
  var dim=new Date(y,m+1,0).getDate();
  var first=new Date(y,m,1).getDay();
  var pnlMap={};
  trades.forEach(function(t){
    var d=t.date;
    if(d&&d.slice(0,7)===(y+'-'+String(m+1).padStart(2,'0'))){
      pnlMap[d]=(pnlMap[d]||0)+safe(t.pnl);
    }
  });
  var todayStr=now.toISOString().slice(0,10);
  var cells=[];
  for(var i=0;i<first;i++) cells.push({day:null,key:'e'+i});
  for(var d=1;d<=dim;d++){
    var dk=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    cells.push({day:d,dk:dk,pnl:pnlMap[dk]||0,isToday:dk===todayStr});
  }
  return e('div',null,
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:8}},
      ['S','M','T','W','T','F','S'].map(function(d,i){
        return e('div',{key:i,style:{textAlign:'center',fontSize:9,color:'#3d4f66',fontWeight:700}},d);
      })
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}},
      cells.map(function(cell){
        if(!cell.day) return e('div',{key:cell.key,style:{aspectRatio:'1'}});
        var bg=cell.pnl>0?'rgba(0,255,159,'+Math.min(.9,Math.abs(cell.pnl)/500*.8+.15)+')':
               cell.pnl<0?'rgba(255,59,92,'+Math.min(.9,Math.abs(cell.pnl)/500*.8+.15)+')':'rgba(255,255,255,0.05)';
        return e('div',{
          key:cell.dk,
          title:dstr(cell.dk)+(cell.pnl?' '+fmtU(cell.pnl):''),
          style:{aspectRatio:'1',borderRadius:4,background:bg,
            border:'1px solid '+(cell.isToday?BLUE:cell.pnl?'rgba(0,212,255,0.18)':'rgba(255,255,255,0.05)'),
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            minHeight:42,boxShadow:cell.isToday?'0 0 6px rgba(0,212,255,0.5)':'none'}
        },
          e('span',{style:{fontSize:13,fontWeight:700,color:cell.isToday?BLUE:'rgba(255,255,255,0.85)',lineHeight:1.2}},cell.day),
          cell.pnl&&e('span',{style:{fontSize:9,fontWeight:800,color:cell.pnl>0?GREEN:RED,lineHeight:1}},(cell.pnl>0?'+':'')+fmtU(cell.pnl))
        );
      })
    )
  );
}

// ── PIVOT TABLE ───────────────────────────────────────────────────────────
function PvtTable(props) {
  var ohlc=props.ohlc,color=props.color||BLUE;
  if(!ohlc) return null;
  var p=pivots(ohlc.h,ohlc.l,ohlc.c);
  var rows=[
    {l:'R3',v:p.r3,c:RED},{l:'R2',v:p.r2,c:RED},{l:'R1',v:p.r1,c:RED},

    {l:'S1',v:p.s1,c:GREEN},{l:'S2',v:p.s2,c:GREEN},{l:'S3',v:p.s3,c:GREEN},
  ];
  return e('div',null,
    e('div',{style:{marginBottom:8}},
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4}},
        ['O','H','L','C'].map(function(k){
          var v=k==='O'?ohlc.o:k==='H'?ohlc.h:k==='L'?ohlc.l:ohlc.c;
          return e('div',{key:k,style:{textAlign:'center',padding:'4px'}},
            e('div',{style:{fontSize:9,color:'#8892a4'}},(k==='O'?'Open':k==='H'?'High':k==='L'?'Low':'Close')),

        })

    ),
    e('div',{style:{display:'flex',flexDirection:'column',gap:2}},
      rows.map(function(row){
        return e('div',{key:row.l,style:{display:'flex',justifyContent:'space-between',padding:'3px 6px',background:row.bold?color+'11':'transparent',borderRadius:3}},
          e('span',{style:{fontSize:11,color:row.c,fontWeight:row.bold?700:400}},'—'+row.l),
          e('span',{style:{fontSize:11,fontFamily:'monospace',color:row.c,fontWeight:row.bold?700:400}},f2(row.v))
        );

}

// ── MD VIEW (simple) ──────────────────────────────────────────────────────

    lines.map(function(line,i){

      if(line.startsWith('## ')){style={fontSize:15,fontWeight:700,color:BLUE,marginTop:10,marginBottom:4}; line=line.slice(3);}
      else if(line.startsWith('# ')){style={fontSize:17,fontWeight:800,color:BLUE,marginTop:12,marginBottom:6}; line=line.slice(2);}
      else if(line.startsWith('**')&&line.endsWith('**')){style={fontSize:13,fontWeight:700,color:'#dde6f0'}; line=line.slice(2,-2);}
      return e('div',{key:i,style:style},line||'\u00a0');
    })
  );
}

      e('div',{
        key:'l'+item.key,

  // ── Stats memo ────────────────────────────────────────────────────────────
  var stats = useMemo(function(){
    if(!trades.length) return null;
    var wins=trades.filter(function(t){return safe(t.pnl)>0;});
    var losses=trades.filter(function(t){return safe(t.pnl)<0;});
    var tot=trades.reduce(function(s,t){return s+safe(t.pnl);},0);
    var avgW=wins.length?wins.reduce(function(s,t){return s+safe(t.pnl);},0)/wins.length:0;
    var avgL=losses.length?Math.abs(losses.reduce(function(s,t){return s+safe(t.pnl);},0)/losses.length):0;
    return {
      total:trades.length,
      wr:Math.round(wins.length/trades.length*100),
      tot:tot,avgW:avgW,avgL:avgL,
      best:Math.max.apply(null,trades.map(function(t){return safe(t.pnl);})),
      worst:Math.min.apply(null,trades.map(function(t){return safe(t.pnl);})),
      pf:avgL?parseFloat((avgW/avgL).toFixed(2)):99,
    };
  },[trades]);

  // ── Filtered trades ───────────────────────────────────────────────────────
  var fTrades = useMemo(function(){
    var t=trades.slice();
    if(jq){var q=jq.toLowerCase();t=t.filter(function(x){return(x.symbol||'').toLowerCase().indexOf(q)>=0||(x.notes||'').toLowerCase().indexOf(q)>=0;});}

    if(jSort==='pnl-desc')t.sort(function(a,b){return safe(b.pnl)-safe(a.pnl);});

  var speak = useCallback(function(text,cb){
    if(!syn.current||muted){if(cb)cb();return;}
    try{syn.current.cancel();}catch(e){}
    interacted.current=true;
    if(!voiceUnlocked.current){
      try{var u=new SpeechSynthesisUtterance('');u.volume=0;syn.current.speak(u);voiceUnlocked.current=true;}catch(e){}
    }
    var micWasBusy=!!wOn.current||!!cRef.current||!!wRef.current;
    if(wRef.current){try{wRef.current.abort();}catch(e){}}
    if(cRef.current){try{cRef.current.abort();}catch(e){}cRef.current=null;}
    setTimeout(function(){
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.rate=0.82;u.pitch=0.68;u.volume=1;

        if(!allV.length)allV=vcs.current||[];

        var voice=null;for(var pi=0;pi<pri.length;pi++){voice=allV.find(pri[pi]);if(voice)break;}

        u.onerror=function(){clearInterval(rt);finish();};
        syn.current.speak(u);

      var ls=csv.trim().split('\n').filter(function(l){return l&&l[0]>='0'&&l[0]<='9';});

      var last=ls[ls.length-1].split(',');

          e('div',null,e(Lbl,null,'Firm'),e('select',{value:chForm.firm,onChange:function(ev){var pf=PROP_FIRMS.find(function(p){return p.name===ev.target.value;});setChForm(function(f){return Object.assign({},f,{firm:ev.target.value},{maxDD:pf?String(pf.maxDD):f.maxDD,dailyDD:pf?String(pf.dailyDD):f.dailyDD,target:pf?String(pf.target):f.target});});},style:{width:'100%',background:'#050d1a',color:'#dde6f0',border:'1px solid rgba(0,212,255,0.22)',borderRadius:8,padding:'9px 12px',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}},
            e('option',{value:''},'— Select —'),
            PROP_FIRMS.map(function(p){return e('option',{key:p.name},p.name);})
          )),
          e('div',null,e(Lbl,null,'Account ($)'),e('input',{type:'number',value:chForm.accountSize,onChange:function(ev){setChForm(function(f){return Object.assign({},f,{accountSize:ev.target.value});});},style:{width:'100%',background:'#050d1a',color:'#dde6f0',border:'1px solid rgba(0,212,255,0.22)',borderRadius:8,padding:'9px 12px',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}))
        ),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:12}},
          ['maxDD','dailyDD','target'].map(function(k){return e('div',{key:k},e(Lbl,null,k==='maxDD'?'Max DD%':k==='dailyDD'?'Daily DD%':'Target%'),e('input',{type:'number',value:chForm[k],onChange:function(ev){setChForm(function(f){var u={};u[k]=ev.target.value;return Object.assign({},f,u);});},style:{width:'100%',background:'#050d1a',color:'#dde6f0',border:'1px solid rgba(0,212,255,0.22)',borderRadius:8,padding:'9px 12px',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}));})
        ),
        e(Btn,{color:GOLD,onClick:function(){if(!chForm.name){notify('Enter challenge name.',RED);return;}setChallenges(function(prev){return[{id:uid(),createdAt:Date.now(),pnl:0,trades:0,phase:'Phase 1',active:true,color:GOLD,progress:0}].concat([Object.assign({},chForm)]).concat(prev);});setChForm({name:'',firm:'',accountSize:'50000',maxDD:'5',dailyDD:'2',target:'8',start:new Date().toISOString().slice(0,10)});notify('Challenge created!',GOLD);},style:{width:'100%'}},
          '🏆 Create Challenge')
      ),
      challenges.length?e('div',{style:{display:'grid',gridTemplateColumns:mob?'1fr':tab?'1fr 1fr':'repeat(3,1fr)',gap:12}},
        challenges.map(function(ch,ci){
          return e(Panel,{key:ch.id||ci,color:ch.color||GOLD,style:{padding:'16px 18px'}},
            e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}},
              e('div',null,
                e('div',{style:{fontWeight:800,fontSize:14,color:ch.color||GOLD}},ch.name||'Challenge'),
                ch.firm&&e('div',{style:{fontSize:11,color:'#8892a4',marginTop:2}},ch.firm)
              ),
              e('button',{onClick:function(){setChallenges(function(prev){return prev.filter(function(c,i){return i!==ci;});});},
                style:{background:'none',border:'none',color:'#3d4f66',cursor:'pointer',fontSize:16,padding:0}},'×')
            ),
            e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
              e(SC,{label:'Max DD',value:(ch.maxDD||'—')+'%',color:RED,tiny:true}),
              e(SC,{label:'Daily DD',value:(ch.dailyDD||'—')+'%',color:GOLD,tiny:true}),
              e(SC,{label:'Target',value:(ch.target||'—')+'%',color:GREEN,tiny:true}),
              e(SC,{label:'Account',value:'$'+(ch.accountSize||'—'),color:BLUE,tiny:true})
            )
          );
        })
      ):e(Panel,{style:{padding:'30px',textAlign:'center',color:'#3d4f66'}},'No challenges yet. Create your first one above.')
    );
  };

  // ── MAIN RENDER ───────────────────────────────────────────────────────────
  return e('div',{style:{minHeight:'100vh',background:BG,color:'#dde6f0',fontFamily:'system-ui,-apple-system,sans-serif',overflowX:'hidden',position:'relative'}},
    // Scan overlay
    e('div',{className:'scan-overlay'}),

    // HUD
    showHUD&&e(HUDGlobe,{vState:vState,wakeOn:wakeOn,mktStatus:autoMktStatus,mktData:mktData,
      onSpeak:listenOnce,onToggleWake:toggleWake,
      onNav:function(k){setView(k);setShowHUD(false);},
      onEnter:function(){setView('dashboard');setShowHUD(false);}}),

    // Header
    e('div',{style:{position:'sticky',top:0,zIndex:100,background:BG+'ee',backdropFilter:'blur(8px)',borderBottom:'1px solid rgba(0,212,255,0.1)',padding:'0 '+( mob?'8px':'16px')}},
      e('div',{style:{display:'flex',alignItems:'center',gap:mob?4:8,overflowX:'auto',padding:'6px 0'}},
        e('button',{onClick:function(){setShowHUD(true);},
          style:{width:34,height:34,borderRadius:'50%',border:'2px solid '+BLUE,background:'rgba(0,212,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,animation:'jglow 3s ease-in-out infinite',cursor:'pointer',color:BLUE,flexShrink:0,boxShadow:'0 0 16px rgba(0,212,255,0.35)'}},
          '⬡'),
        NAV.map(function(n){
          return e('button',{key:n.key,onClick:function(){setView(n.key);},
            style:{padding:'7px 9px',borderRadius:8,border:'none',background:view===n.key?'rgba(0,212,255,0.16)':'transparent',
              color:view===n.key?BLUE:'#8892a4',fontSize:tab?10:11,fontWeight:700,borderBottom:view===n.key?'2px solid '+BLUE:'2px solid transparent',
              whiteSpace:'nowrap',cursor:'pointer',fontFamily:'inherit',letterSpacing:.3,flexShrink:0,
              boxShadow:view===n.key?'0 0 10px rgba(0,212,255,0.2)':'none',transition:'all .2s'}},
            n.icon+' '+n.label);
        })
      )
    ),

    // Notification
    notif&&e('div',{key:notif.id,style:{position:'fixed',top:mob?60:16,right:16,background:notif.color+'22',border:'1px solid '+notif.color+'55',borderRadius:10,padding:'10px 16px',color:notif.color,fontWeight:700,fontSize:13,zIndex:9000,backdropFilter:'blur(8px)',animation:'jfade .3s ease',maxWidth:280}},notif.msg),

    // Voice text
    vText&&e('div',{style:{position:'fixed',bottom:16,left:'50%',transform:'translateX(-50%)',background:'rgba(0,212,255,0.12)',border:'1px solid rgba(0,212,255,0.3)',borderRadius:20,padding:'6px 16px',color:BLUE,fontSize:12,fontWeight:600,zIndex:9000,pointerEvents:'none',maxWidth:'80%',textAlign:'center'}},vText),

    // Main content
    e('div',{style:{padding:mob?'12px':'20px 16px',maxWidth:1100,margin:'0 auto'}},
      view==='dashboard'?vDashboard():
      view==='analytics'?vAnalytics():
      view==='log'?vLog():
      view==='history'?vHistory():
      view==='challenge'?vChallenge():
      view==='sync'?vSync():
      view==='ai'?vAI():
      view==='markets'?vMarkets():
      view==='connect'?vConnect():
      e('div',{style:{padding:'40px',textAlign:'center',color:'#3d4f66'}},'Coming soon')
    )
  );
}

// ── BOOT ──────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(e(JARVIS,null));
setTimeout(function(){if(window.__hideSplash)window.__hideSplash();},1000);

</script>
