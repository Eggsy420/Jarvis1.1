function EqCurve({trades}){

    if(!syn.current||muted){if(cb)cb();return;}

    const u=new SpeechSynthesisUtterance(text);
    // British JARVIS voice settings
    u.rate=0.86;    // slightly slower, more authoritative
    u.pitch=0.72;   // deeper pitch
    u.volume=1;
    // Voice priority: Daniel (iOS British) > Arthur (iOS British) > Google UK > Microsoft George > any en-GB > any English
    const allVoices=vcs.current.length?vcs.current:(syn.current.getVoices()||[]);
    const priority=[
      v=>v.name==="Daniel",                          // iOS/macOS British male — best
      v=>v.name==="Arthur",                          // iOS British male fallback
      v=>v.name.includes("Daniel"),
      v=>v.name.includes("Arthur"),
      v=>v.name.includes("Google UK English Male"),
      v=>v.name.includes("Microsoft George"),
      v=>v.name.includes("Microsoft Hazel"),
      v=>v.name.includes("Microsoft David"),
      v=>v.lang==="en-GB",                           // any British English
      v=>v.lang.startsWith("en-GB"),
      v=>v.name.includes("Alex"),
      v=>v.lang.startsWith("en"),                    // any English last resort
    ];
    let voice=null;
    for(const test of priority){voice=allVoices.find(test);if(voice)break;}
    if(voice){
      u.voice=voice;
      // Fine-tune pitch/rate per voice for best JARVIS effect
      if(voice.name.includes("Daniel")||voice.name.includes("Arthur")){u.rate=0.84;u.pitch=0.70;}

    u.onerror=()=>{setVState("idle");if(cb)cb();};

      if(silenceTimer)clearTimeout(silenceTimer);
      if(finalResult.trim()){hvcmd(finalResult.trim());}
      else{setVState(s=>s==="listening"?"idle":s);}
    };
    r.start();
    // Hard maximum: stop after 15 seconds no matter what
    setTimeout(()=>{try{r.stop();}catch{}},15000);

  const startWake=useCallback(async()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){

      setMicStatus("error");
      return;
    }
    // Request mic permission explicitly first
    try{
      await navigator.mediaDevices.getUserMedia({audio:true});
      setMicStatus("granted");
    }catch(err){
      setMicStatus("denied");
      setWakeOn(false);
      wOn.current=false;
      notify("Microphone access denied. Allow mic in browser settings then try again.","#ff3b5c");
      return;
    }
    if(wRef.current){try{wRef.current.abort();}catch{}}
    const launch=()=>{
      if(!wOn.current)return;
      const r=new SR();
      r.lang="en-US";r.continuous=true;r.interimResults=true;r.maxAlternatives=1;
      wRef.current=r;
      r.onstart=()=>setMicStatus("active");
      r.onresult=e=>{
        for(let i=e.resultIndex;i<e.results.length;i++){
          const t=e.results[i][0].transcript.toLowerCase();
          if((t.includes("hey jarvis")||t.includes("wake up jarvis")||t.includes("jarvis"))&&wOn.current){
            speak("Yes, Sir?",()=>listenOnce());
            break;
          }
        }
      };
      r.onend=()=>{
        if(wOn.current){
          setMicStatus("granted");
          setTimeout(()=>{if(wOn.current)launch();},300);
        }else{
          setMicStatus("unknown");
        }
      };
      r.onerror=e=>{
        if(e.error==="not-allowed"||e.error==="service-not-allowed"){
          setMicStatus("denied");
          setWakeOn(false);
          wOn.current=false;
          notify("Mic access denied. Check browser settings.","#ff3b5c");
        }else if(e.error==="network"){
          setMicStatus("error");
          notify("Network error with speech service. Check internet connection.","#ff3b5c");
        }else if(e.error!=="aborted"&&e.error!=="no-speech"){
          setMicStatus("error");
        }
      };
      try{r.start();}catch(e){
        if(wOn.current)setTimeout(()=>{if(wOn.current)launch();},500);
      }
    };
    launch();
  },[speak,listenOnce,notify]);

      r.onresult=e=>{
        for(let i=e.resultIndex;i<e.results.length;i++){

          if((t.includes("hey jarvis")||t.includes("wake up jarvis")||t.includes("jarvis"))&&wOn.current){

        }else if(e.error!=="aborted"&&e.error!=="no-speech"){

            <Panel color="#b45bff" style={{padding:"18px 20px"}}>
